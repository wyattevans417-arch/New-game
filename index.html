<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>RNG Idle - V.1</title>
  <style>
    :root {
      --bg-a: #070815;
      --bg-b: #151c42;
      --panel: rgba(255,255,255,0.08);
      --panel-strong: rgba(255,255,255,0.15);
      --border: rgba(255,255,255,0.22);
      --text: #f8faff;
      --muted: #aeb8dc;
      --top-bar: clamp(58px, 9dvh, 94px);
      --bottom-bar: clamp(86px, 15dvh, 148px);
      --radius: clamp(20px, 3vw, 34px);
      --shadow: 0 20px 50px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.10);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%; margin: 0; overflow: hidden; color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 18% 8%, rgba(80,112,255,0.46), transparent 31%),
        radial-gradient(circle at 86% 15%, rgba(176,78,255,0.34), transparent 34%),
        radial-gradient(circle at 45% 95%, rgba(255,174,89,0.16), transparent 33%),
        linear-gradient(135deg, var(--bg-a), var(--bg-b));
      user-select: none;
    }

    body.graphics-low {
      background: linear-gradient(135deg, #090b18, #11172f);
    }

    button, input, select { font: inherit; color: inherit; }
    button { cursor: pointer; }

    #app {
      width: 100vw; height: 100dvh; min-width: 280px; min-height: 420px;
      display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: var(--top-bar) 1fr var(--bottom-bar);
    }

    .top-bar {
      grid-column: 1 / -1; grid-row: 1;
      display: flex; align-items: center; justify-content: space-between; gap: clamp(8px, 2vw, 24px);
      padding: max(9px, env(safe-area-inset-top)) clamp(12px, 3vw, 32px) 9px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.13), rgba(255,255,255,0.04));
      backdrop-filter: blur(18px);
      box-shadow: 0 0 32px rgba(112,143,255,0.25);
      z-index: 5;
    }
    body.graphics-low .top-bar, body.graphics-low .bottom-bar { backdrop-filter: none; box-shadow: none; }

    .brand { display: flex; align-items: center; gap: clamp(8px, 1.5vw, 16px); min-width: 0; }
    .brand-mark {
      width: clamp(34px, 5dvh, 54px); height: clamp(34px, 5dvh, 54px); border-radius: 18px;
      display: grid; place-items: center; font-weight: 1000; font-size: clamp(18px, 3dvh, 29px);
      background: linear-gradient(135deg, #7aa3ff, #c071ff); box-shadow: 0 0 24px rgba(135,129,255,0.55);
      flex: 0 0 auto;
    }
    body.graphics-low .brand-mark { box-shadow: none; }
    .title-wrap { min-width: 0; }
    .game-title { font-size: clamp(22px, 4dvh, 40px); line-height: 1; font-weight: 1000; letter-spacing: 0.04em; white-space: nowrap; }
    .subtitle { margin-top: 4px; color: var(--muted); font-size: clamp(11px, 1.7dvh, 14px); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .stats { display: flex; justify-content: flex-end; gap: clamp(7px, 1.2vw, 14px); flex-wrap: wrap; align-items: center; }
    .pill { min-width: clamp(76px, 10vw, 126px); padding: 8px 11px; border: 1px solid var(--border); border-radius: 999px; background: var(--panel); text-align: center; }
    .pill.money { background: linear-gradient(135deg, rgba(255,220,105,0.18), rgba(255,255,255,0.08)); border-color: rgba(255,222,125,0.35); }
    .pill-label { color: var(--muted); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; }
    .pill-value { font-size: clamp(13px, 1.8dvh, 17px); font-weight: 1000; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .top-action {
      border: 1px solid var(--border); border-radius: 999px; padding: 8px 12px;
      background: linear-gradient(135deg, rgba(255,226,127,0.22), rgba(255,255,255,0.08));
      color: var(--text); font-weight: 1000; white-space: nowrap; box-shadow: inset 0 1px 0 rgba(255,255,255,0.16);
    }
    .top-action:hover { background: rgba(255,255,255,0.22); }
    .top-action.hidden { display: none; }
    .auto-top.active { border-color: rgba(127,255,172,0.55); background: linear-gradient(135deg, rgba(88,255,145,0.38), rgba(255,255,255,0.14)); }
    .menu-btn.menu-notify { border-color: rgba(255,231,117,0.82); box-shadow: 0 0 18px rgba(255,226,121,0.28), inset 0 1px 0 rgba(255,255,255,0.18); }
    .menu-btn.menu-notify .menu-icon::after { content: " ✨"; }
    .new-badge { position: absolute; left: 7px; top: 7px; z-index: 5; padding: 4px 7px; border-radius: 999px; background: rgba(255,231,117,0.95); color: #2d2100; font-weight: 1000; font-size: 11px; box-shadow: 0 0 12px rgba(255,225,121,0.45); }
    .shop-slot-label { display: inline-flex; align-items: center; gap: 4px; width: max-content; padding: 4px 8px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.08); color: #dfe6ff; font-size: 11px; font-weight: 1000; text-transform: uppercase; letter-spacing: 0.08em; }
    .milestone-pop { position: fixed; inset: 0; z-index: 80; display: none; place-items: center; padding: 18px; background: rgba(0,0,0,0.38); }
    .milestone-pop.show { display: grid; }
    .milestone-card { width: min(92vw, 430px); border: 1px solid rgba(255,255,255,0.28); border-radius: 28px; background: linear-gradient(145deg, rgba(33,42,91,0.98), rgba(10,13,28,0.98)); box-shadow: 0 28px 90px rgba(0,0,0,0.45), 0 0 45px rgba(255,226,121,0.18); padding: 22px; display: grid; gap: 12px; text-align: center; animation: milestonePop 0.22s ease both; }
    .milestone-emoji { font-size: 46px; line-height: 1; }
    .milestone-title { font-size: clamp(22px, 4vw, 32px); font-weight: 1000; }
    .milestone-desc { color: var(--muted); line-height: 1.45; }
    @keyframes milestonePop { from { opacity: 0; transform: translateY(12px) scale(0.94); } to { opacity: 1; transform: translateY(0) scale(1); } }

    .tutorial-top { min-width: 44px; text-align: center; background: linear-gradient(135deg, rgba(255,226,127,0.26), rgba(112,172,255,0.18)); }
    .tutorial-top:hover, .tutorial-top:focus-visible { border-color: rgba(255,231,117,0.72); }
    .tutorial-overlay {
      position: fixed; inset: 0; z-index: 90; display: none; align-items: center; justify-content: center;
      padding: max(16px, env(safe-area-inset-top)) clamp(12px, 3vw, 28px) max(16px, env(safe-area-inset-bottom));
      background: radial-gradient(circle at 50% 16%, rgba(120,150,255,0.22), transparent 32%), rgba(3,5,15,0.70);
      backdrop-filter: blur(8px);
    }
    .tutorial-overlay.show { display: flex; }
    body.graphics-low .tutorial-overlay { backdrop-filter: none; }
    .tutorial-highlight {
      position: fixed; display: none; z-index: 91; pointer-events: none; border: 3px solid rgba(255,226,113,0.96);
      border-radius: 24px; box-shadow: 0 0 0 9999px rgba(3,5,15,0.24), 0 0 32px rgba(255,225,113,0.65);
      transition: inset 0.16s ease, width 0.16s ease, height 0.16s ease, border-radius 0.16s ease;
      animation: tutorialGlow 1.1s ease-in-out infinite alternate;
    }
    body.anti-lag .tutorial-highlight, body.reduce-motion .tutorial-highlight { animation: none; transition: none; }
    @keyframes tutorialGlow { from { box-shadow: 0 0 0 9999px rgba(3,5,15,0.24), 0 0 22px rgba(255,225,113,0.46); } to { box-shadow: 0 0 0 9999px rgba(3,5,15,0.20), 0 0 44px rgba(255,225,113,0.82); } }
    .tutorial-card {
      width: min(94vw, 520px); z-index: 92; align-self: end; border: 1px solid rgba(255,255,255,0.30); border-radius: 28px;
      background: linear-gradient(145deg, rgba(31,39,82,0.98), rgba(8,11,26,0.98));
      box-shadow: 0 26px 90px rgba(0,0,0,0.50), inset 0 1px 0 rgba(255,255,255,0.14);
      padding: clamp(16px, 3vw, 24px); display: grid; gap: 12px; animation: milestonePop 0.18s ease both;
    }
    .tutorial-kicker { color: #ffe680; font-size: 12px; font-weight: 1000; letter-spacing: 0.12em; text-transform: uppercase; }
    .tutorial-title { font-size: clamp(23px, 4.5vw, 34px); font-weight: 1000; line-height: 1.02; letter-spacing: -0.03em; }
    .tutorial-text { color: #e7ecff; line-height: 1.46; font-weight: 760; margin: 0; }
    .tutorial-tip { border: 1px solid rgba(255,226,127,0.28); border-radius: 18px; background: rgba(255,226,127,0.08); padding: 10px 12px; color: #fff0ad; font-size: 13px; line-height: 1.35; font-weight: 900; }
    .tutorial-nav { display: flex; align-items: center; justify-content: space-between; gap: 9px; flex-wrap: wrap; margin-top: 2px; }
    .tutorial-nav-left, .tutorial-nav-right { display: flex; gap: 8px; flex-wrap: wrap; }
    .tutorial-dots { display: flex; gap: 5px; align-items: center; justify-content: center; flex: 1 1 auto; min-width: 90px; }
    .tutorial-dot { width: 8px; height: 8px; border-radius: 99px; background: rgba(255,255,255,0.28); }
    .tutorial-dot.active { width: 22px; background: #ffe179; }
    @media (max-width: 720px), (max-height: 560px) {
      .tutorial-card { align-self: end; width: min(96vw, 440px); }
      .tutorial-title { font-size: clamp(20px, 5vw, 28px); }
      .tutorial-text { font-size: 14px; }
      .tutorial-nav { align-items: stretch; }
      .tutorial-nav-left, .tutorial-nav-right { width: 100%; justify-content: space-between; }
      .tutorial-dots { order: -1; width: 100%; }
    }
    body.anti-lag, body.anti-lag * { scroll-behavior: auto !important; }
    body.anti-lag .start-title, body.anti-lag .rng-card, body.anti-lag .rare-frame, body.anti-lag .rare-frame::before, body.anti-lag .flip-inner, body.anti-lag .menu-panel, body.anti-lag .shake, body.anti-lag .variant-shiny-word, body.anti-lag .variant-card-text-rainbow, body.anti-lag .milestone-card { animation: none !important; }
    body.anti-lag .rng-card, body.anti-lag .half, body.anti-lag .menu-btn, body.anti-lag .locked-card { box-shadow: none !important; }
    body.anti-lag .arena::before, body.anti-lag .rare-frame::before { display: none !important; }
    .setting-card input[type="range"] { width: 100%; accent-color: #ffe179; }

    .quest-top { min-width: 46px; text-align: center; }
    .quest-top.menu-notify { border-color: rgba(255,231,117,0.82); box-shadow: 0 0 18px rgba(255,226,121,0.28), inset 0 1px 0 rgba(255,255,255,0.18); }
    .stats-top { min-width: 46px; text-align: center; background: linear-gradient(135deg, rgba(112,172,255,0.24), rgba(255,255,255,0.08)); }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: clamp(10px, 1.7vw, 16px); margin-bottom: 14px; }
    .stat-card { border: 1px solid var(--border); border-radius: 20px; background: rgba(255,255,255,0.08); padding: 13px; display: grid; gap: 6px; min-width: 0; }
    .stat-label { color: var(--muted); font-size: 11px; font-weight: 1000; text-transform: uppercase; letter-spacing: 0.08em; }
    .stat-value { font-size: clamp(18px, 3dvh, 30px); font-weight: 1000; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .stat-bars { border: 1px solid var(--border); border-radius: 22px; background: rgba(255,255,255,0.07); padding: 14px; display: grid; gap: 11px; }
    .stat-bar-row { display: grid; grid-template-columns: minmax(82px, 0.7fr) minmax(130px, 2fr) auto; gap: 10px; align-items: center; }
    .stat-bar-track { height: 12px; border: 1px solid rgba(255,255,255,0.16); border-radius: 999px; overflow: hidden; background: rgba(0,0,0,0.24); }
    .stat-bar-fill { height: 100%; border-radius: inherit; background: linear-gradient(90deg, rgba(117,151,255,0.82), rgba(255,211,106,0.86)); }
    .stat-bar-name { color: var(--muted); font-size: 12px; font-weight: 900; }
    .stat-bar-num { font-size: 12px; font-weight: 1000; }
    .subtab-note { margin-top: 8px; }



    .main { grid-column: 1 / -1; grid-row: 2 / 4; min-height: 0; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: minmax(0, 1fr) var(--bottom-bar); gap: clamp(10px, 2vw, 24px); padding: clamp(10px, 2vw, 24px); }
    .half {
      min-width: 0; min-height: 0; border: 1px solid var(--border); border-radius: var(--radius);
      background: linear-gradient(145deg, rgba(255,255,255,0.11), rgba(255,255,255,0.05));
      box-shadow: var(--shadow); overflow: hidden; position: relative;
    }
    body.graphics-low .half { box-shadow: none; }

    .arena { grid-column: 1; grid-row: 1; display: grid; place-items: center; padding: clamp(10px, 2vw, 28px); }
    .arena::before {
      content: ""; position: absolute; width: min(72%, 560px); aspect-ratio: 1; border-radius: 999px;
      background: radial-gradient(circle, rgba(128,161,255,0.25), transparent 65%); opacity: 0.95;
    }
    body.graphics-low .arena::before { display: none; }

    .start-title {
      position: relative; width: min(88%, 560px); min-height: clamp(150px, 30dvh, 310px); border-radius: clamp(24px, 4vw, 46px);
      display: grid; place-items: center; align-content: center; gap: clamp(8px, 2dvh, 18px); padding: clamp(18px, 4vw, 42px);
      color: #f9fbff; text-align: center;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,0.25), transparent 38%),
        linear-gradient(145deg, rgba(114,145,255,0.9), rgba(184,93,255,0.84) 56%, rgba(255,183,93,0.82));
      border: clamp(4px, 0.9vw, 10px) solid rgba(255,255,255,0.68);
      box-shadow: 0 25px 80px rgba(0,0,0,0.36), 0 0 70px rgba(151,126,255,0.52), inset 0 1px 0 rgba(255,255,255,0.40);
      animation: titleIdle 2.7s ease-in-out infinite; z-index: 2;
    }
    body.graphics-low .start-title { animation: none; box-shadow: none; }
    .start-name { font-size: clamp(38px, 8vw, 104px); line-height: 0.95; font-weight: 1000; letter-spacing: -0.07em; text-shadow: 0 8px 28px rgba(0,0,0,0.34); }
    .start-subtitle { font-size: clamp(13px, 2.3dvh, 23px); font-weight: 900; color: rgba(255,255,255,0.82); text-transform: uppercase; letter-spacing: 0.14em; }
    @keyframes titleIdle { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10px) scale(1.018); } }

    .card-stage { position: relative; display: none; width: min(74%, 335px); max-height: 100%; aspect-ratio: 2.5 / 3.5; perspective: 1200px; z-index: 2; }
    .card-stage.show { display: block; }
    .card-stage.multi-show { width: min(98%, 980px); aspect-ratio: auto; display: grid; place-items: center; }
    .roll-card-grid { width: 100%; max-height: 100%; display: grid; grid-template-columns: repeat(var(--roll-cols, 1), minmax(0, 1fr)); gap: clamp(6px, 1.1vw, 14px); align-items: center; justify-items: center; }
    .roll-card-wrap { position: relative; width: 100%; max-width: min(152px, 18vw); aspect-ratio: 2.5 / 3.5; }
    .roll-card-grid.roll-count-1 .roll-card-wrap { max-width: min(335px, 74vw); }
    .roll-card-grid.roll-count-2 .roll-card-wrap { max-width: min(235px, 31vw); }
    .roll-card-grid.roll-count-3 .roll-card-wrap { max-width: min(200px, 23vw); }
    .roll-card-grid.roll-count-4 .roll-card-wrap { max-width: min(176px, 18vw); }
    .roll-card-grid .rng-card { border-width: clamp(2px, 0.35vw, 4px); border-radius: clamp(12px, 1.6vw, 22px); }
    .roll-card-grid .card-name { font-size: clamp(9px, 1.15vw, 15px); padding: 0 5px; }
    .roll-card-grid .odds-box { margin: 5px 6px 0; border-radius: 10px; font-size: clamp(11px, 1.45vw, 20px); }
    .roll-card-grid .emoji-box { font-size: clamp(28px, 5.1vw, 78px); }
    .roll-card-grid .rarity-box { font-size: clamp(9px, 1.25vw, 17px); }

    .rng-card {
      width: 100%; height: 100%; display: grid; grid-template-rows: 13% 20% 36% 31%; border-radius: clamp(15px, 2.4vw, 28px);
      border: clamp(3px, 0.55vw, 6px) solid rgba(255,255,255,0.82); overflow: hidden; color: #10172a;
      box-shadow: 0 22px 70px rgba(0,0,0,0.38), 0 0 45px rgba(255,255,255,0.18); transform-style: preserve-3d;
    }
    body.graphics-low .rng-card { box-shadow: 0 10px 18px rgba(0,0,0,0.26); }
    .card-stage .rng-card.flash { animation: cardFlash 0.12s ease-out both; }
    .card-stage .rng-card.reveal { animation: revealPop 0.48s cubic-bezier(.2,1.4,.35,1) both; }
    body.reduce-motion .rng-card, body.graphics-low .card-stage .rng-card { animation: none !important; }
    @keyframes cardFlash { from { transform: scale(0.94) rotate(-2deg); filter: brightness(1.65); } to { transform: scale(1) rotate(1deg); filter: brightness(1); } }
    @keyframes revealPop { 0% { transform: scale(0.78) rotateY(70deg); filter: brightness(2); opacity: 0; } 55% { transform: scale(1.08) rotateY(-10deg); opacity: 1; } 100% { transform: scale(1) rotateY(0); filter: brightness(1); } }

    .rare-frame { width: 100%; height: 100%; position: relative; perspective: 1200px; animation: rareBoxPulse 1.25s ease both; }
    .rare-frame::before {
      content: ""; position: absolute; inset: -9%; border-radius: 24px;
      background: conic-gradient(from 0deg, rgba(255,255,255,0), rgba(255,230,129,0.65), rgba(155,231,255,0.55), rgba(255,122,238,0.65), rgba(255,255,255,0));
      filter: blur(14px); opacity: 0; animation: rareGlow 1.45s ease both;
    }
    .flip-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; animation: rareFlip 1.15s cubic-bezier(.16,.9,.28,1.18) both; }
    .flip-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: clamp(15px, 2.4vw, 28px); }
    .flip-back {
      display: grid; place-items: center; font-size: clamp(80px, 14vw, 160px); font-weight: 1000; color: rgba(255,255,255,0.9);
      border: clamp(3px, 0.55vw, 6px) solid rgba(255,255,255,0.5);
      background: radial-gradient(circle at 50% 35%, rgba(255,255,255,0.18), rgba(19,23,47,0.98) 62%), linear-gradient(145deg, #10152e, #070912);
      box-shadow: 0 22px 70px rgba(0,0,0,0.45), inset 0 0 35px rgba(255,255,255,0.08);
    }
    .flip-front { transform: rotateY(180deg); }
    body.reduce-motion .rare-frame, body.reduce-motion .rare-frame::before, body.reduce-motion .flip-inner,
    body.graphics-low .rare-frame, body.graphics-low .rare-frame::before, body.graphics-low .flip-inner { animation: none !important; }
    body.graphics-low .flip-front { transform: none; }
    body.graphics-low .flip-back { display: none; }
    @keyframes rareFlip { 0% { transform: rotateY(0) scale(0.92); } 42% { transform: rotateY(0) scale(1.02); } 100% { transform: rotateY(180deg) scale(1); } }
    @keyframes rareGlow { 0%,20% { opacity: 0; transform: rotate(0deg) scale(0.9); } 55% { opacity: 1; } 100% { opacity: 0.72; transform: rotate(180deg) scale(1); } }
    @keyframes rareBoxPulse { 0% { filter: brightness(0.7); } 45% { filter: brightness(1.8); } 100% { filter: brightness(1); } }

    .card-name { display: grid; place-items: center; padding: 0 10px; text-align: center; font-weight: 1000; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; background: rgba(255,255,255,0.72); border-bottom: 1px solid rgba(17,23,42,0.18); }
    .odds-box { margin: 8px 10px 0; border: 2px solid rgba(17,23,42,0.20); border-radius: 16px; display: grid; place-items: center; background: rgba(255,255,255,0.80); font-size: clamp(18px, 3.2dvh, 34px); font-weight: 1000; letter-spacing: -0.045em; text-align: center; }
    .emoji-box { display: grid; place-items: center; font-size: clamp(52px, 13dvh, 116px); filter: drop-shadow(0 10px 14px rgba(0,0,0,0.25)); }
    .rarity-box { display: grid; place-items: center; text-align: center; font-weight: 1000; font-size: clamp(17px, 3dvh, 31px); text-transform: uppercase; letter-spacing: 0.06em; border-top: 2px solid rgba(17,23,42,0.15); }

    .rarity-common { background: linear-gradient(145deg, #f6f8ff, #c7d2ec); border-color: #edf2ff; }
    .rarity-common .rarity-box { color: #27324d; background: linear-gradient(90deg, #d4dced, #eef2ff); }
    .rarity-uncommon { background: linear-gradient(145deg, #ecfff2, #7ee69a); border-color: #c9ffd5; }
    .rarity-uncommon .rarity-box { color: #063b17; background: linear-gradient(90deg, #4bd96f, #b7ffd0); }
    .rarity-rare { background: linear-gradient(145deg, #eaf6ff, #5db1ff); border-color: #bde2ff; }
    .rarity-rare .rarity-box { color: #062952; background: linear-gradient(90deg, #3d95ff, #bfe6ff); }
    .rarity-epic { background: linear-gradient(145deg, #fbecff, #c06dff); border-color: #e8c5ff; }
    .rarity-epic .rarity-box { color: #33034f; background: linear-gradient(90deg, #a746ef, #ecc3ff); }
    .rarity-legendary { background: linear-gradient(145deg, #fff7cf, #ffb22e); border-color: #ffe88c; box-shadow: 0 22px 70px rgba(0,0,0,0.38), 0 0 42px rgba(255,193,69,0.42); }
    .rarity-legendary .rarity-box { color: #4f2700; background: linear-gradient(90deg, #ff9f1c, #ffe680); }
    .rarity-mythic { background: linear-gradient(145deg, #ffe9f1, #84e9ff 48%, #f6a8ff); border-color: #ffffff; box-shadow: 0 22px 80px rgba(0,0,0,0.42), 0 0 60px rgba(176,112,255,0.62); }
    .rarity-mythic .rarity-box { color: #241044; background: linear-gradient(90deg, #ff76dd, #8beeff, #ffdf75); }

    window.__v1SingleTabActive = true;
    let singleTabHeartbeat = null;
    let singleTabChannel = null;

    function readSingleTabJSON(key) {
      try { return JSON.parse(localStorage.getItem(key) || "null"); } catch (error) { return null; }
    }

    function writeSingleTabJSON(key, value) {
      try { localStorage.setItem(key, JSON.stringify(value)); } catch (error) {}
    }

    function showSingleTabOverlay() {
      let overlay = document.getElementById("singleTabOverlay");
      if (!overlay) {
        overlay = document.createElement("div");
        overlay.id = "singleTabOverlay";
        overlay.className = "single-tab-overlay";
        overlay.innerHTML = `

            <div class="single-tab-icon">🔒</div>

            <p>Only one copy of V.1 can run on this device. This tab was paused so your save does not get overwritten.</p>

    function makeOdds(index) {
      if (index === 0) return 2;
      if (index === 255) return 1000000000;
      const curve = index / 255;
      const wave = 1 + (Math.sin(index * 1.73) * 0.035) + (Math.cos(index * 0.41) * 0.025);
      return Math.max(2, Math.round(2 * Math.pow(500000000, curve) * wave));
    }

    function rarityForOdds(odds) {
      if (odds < 80) return "Common";
      if (odds < 1000) return "Uncommon";
      if (odds < 20000) return "Rare";
      if (odds < 1000000) return "Epic";
      if (odds < 35000000) return "Legendary";
      return "Mythic";
    }

        if (id === CARD_THEMES.length) odds = 1000000000;
        previousOdds = odds;
        return { id, baseName, emoji, odds, rarity: rarityForOdds(odds) };
      });

    function seededWeatherIndex(slotStart) {
      let seed = Math.floor(slotStart / WEATHER_SLOT_MS) ^ 0x9e3779b9;
      seed ^= seed << 13; seed ^= seed >>> 17; seed ^= seed << 5;
      return Math.abs(seed) % WEATHER_DEFS.length;
    }

    function activeWeatherEvent(now = Date.now()) {
      const slotStart = Math.floor(now / WEATHER_SLOT_MS) * WEATHER_SLOT_MS;
      const elapsed = now - slotStart;
      if (elapsed < 0 || elapsed >= WEATHER_DURATION_MS) return null;
      if (!state.weather || Number(state.weather.slotStart) !== slotStart || !WEATHER_BY_ID.has(state.weather.id)) {
        const picked = WEATHER_DEFS[seededWeatherIndex(slotStart)];
        state.weather = { slotStart, id: picked.id };
        saveState();
      }
      const base = WEATHER_BY_ID.get(state.weather.id) || WEATHER_DEFS[0];
      return { ...base, slotStart, endsAt: slotStart + WEATHER_DURATION_MS, remaining: Math.max(0, slotStart + WEATHER_DURATION_MS - now) };
    }

    function weatherMultiplier(type) {
      const event = activeWeatherEvent();
      if (!event) return 1;
      if (type === "sell" && event.id === "rain") return 2;
      if (type === "luck" && event.id === "snow") return 3;
      if (type === "variant" && event.id === "tornado") return 5;
      if (type === "rollSpeed" && event.id === "storm") return 0.2;
      return 1;
    }

    function formatNumber(number) { return new Intl.NumberFormat("en-US").format(Math.floor(number)); }
    function compactNumber(value) {
      const number = Math.max(0, Number(value) || 0);
      const units = [
        { value: 1e15, suffix: "q" }, { value: 1e12, suffix: "t" },
        { value: 1e9, suffix: "b" }, { value: 1e6, suffix: "m" }, { value: 1e3, suffix: "k" }
      ];
      for (const unit of units) {
        if (number >= unit.value) {
          const short = number / unit.value;
          const shown = short >= 100 ? Math.floor(short).toString() : short >= 10 ? short.toFixed(1).replace(/\.0$/, "") : short.toFixed(2).replace(/\.00$/, "").replace(/0$/, "");
          return shown + unit.suffix;
        }
      }
      return Math.floor(number).toString();
    }

    function normalizeVariantIds(variantIds = []) {
      const input = Array.isArray(variantIds) ? variantIds : String(variantIds || "").split("+");
      const set = new Set(input.filter(id => VARIANT_BY_ID.has(id)));
      return VARIANT_DEFS.map(v => v.id).filter(id => set.has(id));
    }

    function rollVariantIds() {

      variantMult *= weatherMultiplier("variant");
      return VARIANT_DEFS.filter(variant => Math.random() < Math.min(0.25, (1 / variant.chance) * variantMult)).map(variant => variant.id);
    }

    function makeCardKey(cardId, variantIds = []) {

    function parseCardKey(key) {

      return { ...base, odds, rarity: rarityForOdds(odds), variantIds: clean, variantKey: makeCardKey(base.id, clean) };
    }

    function sumVariantOwnedCount(cardId) {
      const prefix = `${Number(cardId)}|`;

    function entryOwnedCount(card) {
      const clean = normalizeVariantIds(card.variantIds);
      if (!clean.length) return plainOwnedCount(card.id);
      return Number((state.variantCounts || {})[makeCardKey(card.id, clean)]) || 0;

    function ownedCardEntries() {
      if (!state.variantCounts) state.variantCounts = {};
      const entries = [];
      for (const card of CARDS) {
        if (plainOwnedCount(card.id) > 0) entries.push(makeVariantCard(card, []));
      }
      for (const [key, qty] of Object.entries(state.variantCounts)) {
        if ((Number(qty) || 0) <= 0) continue;
        const parsed = parseCardKey(key);
        const base = CARD_BY_ID.get(parsed.id);
        if (base) entries.push(makeVariantCard(base, parsed.variantIds));
      }
      return entries.sort((a, b) => b.odds - a.odds || a.id - b.id);
    }

    function variantSummaryFor(cardId) {
      const prefix = `${Number(cardId)}|`;
      const parts = [];
      for (const [key, qty] of Object.entries(state.variantCounts || {})) {
        if (!key.startsWith(prefix) || qty <= 0) continue;
        const parsed = parseCardKey(key);

      return parts.length ? parts.join(" · ") : "No variants owned yet";
    }


    function currentManualRollStreak(now = Date.now()) {
      const streak = Math.max(0, Number(state.manualRollStreak) || 0);
      const lastAt = Math.max(0, Number(state.manualRollLastAt) || 0);
      if (!streak || !lastAt) return 0;
      return now - lastAt < MANUAL_ROLL_BONUS_WINDOW ? streak : 0;
    }

    function manualRollLuckMultiplier(now = Date.now()) {
      return 1 + (currentManualRollStreak(now) * MANUAL_ROLL_BONUS_PER_ROLL);
    }

    function manualRollBonusPercent(now = Date.now()) {
      return (manualRollLuckMultiplier(now) - 1) * 100;
    }

    function registerManualRollBonus() {
      const now = Date.now();
      const activeStreak = currentManualRollStreak(now);
      state.manualRollStreak = activeStreak > 0 ? activeStreak + 1 : 1;
      state.manualRollLastAt = now;
      updateManualRollBonusDisplay(true);
    }

    function updateManualRollBonusDisplay(bump = false) {
      if (!manualRollBonus || !manualBonusValue || !manualBonusStreak || !manualBonusTimerText || !manualBonusFill) return;
      const now = Date.now();
      let streak = currentManualRollStreak(now);
      let remaining = 0;
      if (streak > 0) {
        remaining = Math.max(0, MANUAL_ROLL_BONUS_WINDOW - (now - (Number(state.manualRollLastAt) || 0)));
      } else if ((Number(state.manualRollStreak) || 0) || (Number(state.manualRollLastAt) || 0)) {
        state.manualRollStreak = 0;
        state.manualRollLastAt = 0;
        saveState();
      }
      const bonusPct = streak * MANUAL_ROLL_BONUS_PER_ROLL * 100;
      manualBonusValue.textContent = `+${bonusPct.toFixed(2)}% Luck`;
      manualBonusStreak.textContent = streak === 1 ? "1 manual roll" : `${compactNumber(streak)} manual rolls`;
      manualBonusTimerText.textContent = streak > 0 ? `${(remaining / 1000).toFixed(1)}s` : "17.0s";
      manualBonusFill.style.width = streak > 0 ? `${Math.max(0, Math.min(100, remaining / MANUAL_ROLL_BONUS_WINDOW * 100))}%` : "0%";
      manualRollBonus.classList.toggle("active", streak > 0);
      if (bump) {
        manualRollBonus.classList.remove("bump");
        void manualRollBonus.offsetWidth;
        manualRollBonus.classList.add("bump");
      }
    }

    function startManualRollBonusLoop() {
      updateManualRollBonusDisplay(false);
      if (manualBonusInterval) return;
      manualBonusInterval = setInterval(() => {
        updateManualRollBonusDisplay(false);
        if (currentMenu === "Stats") renderStats();
      }, 100);
    }

    function updateStats() {
      ensureDaily();
      pruneBoosts();
      updateManualRollBonusDisplay(false);
      const owned = Object.keys(state.counts).filter(id => state.counts[id] > 0).length;
      moneyStat.textContent = moneyText(state.money);
      if (rollsStat) rollsStat.textContent = compactNumber(state.rolls);
      if (ownedStat) ownedStat.textContent = owned + " / 256";
      const lastBase = state.lastId ? CARD_BY_ID.get(Number(state.lastId)) : null;
      const last = lastBase ? makeVariantCard(lastBase, state.lastVariant || []) : null;
      lastStat.textContent = last ? (variantLabelText(last.variantIds) || last.rarity) : "None";
      updateRollButtonText();
      updateWeatherBox();
      refreshMenuUnlocks();
      updateAutoLoop();
    }

    function updateRollButtonText() {
      if (rolling) return;
      const count = rollCount();
      const auto = state.autoRoll && autoInterval() > 0 ? " · Auto On" : "";
      rollButton.textContent = count > 1 ? `Roll x${count}${auto}` : `Roll${auto}`;
    }

    function fullCardHTML(card, mode = "", count = null, extraClass = "") {
      const glow = state.glows[card.id] ? " ✨" : "";
      const countBadge = count !== null ? `<div class="count-badge">x${compactNumber(count)}</div>` : "";
      const lockBadge = isLocked(card.id) ? `<div class="lock-badge">🔒</div>` : "";
      const variantIds = normalizeVariantIds(card.variantIds);
      const variantClasses = variantClassList(variantIds);
      const dominantTextClass = variantDominantTextClass(variantIds);
      const shownName = escapeHTML(cardTitle(card));
      return `
        <article class="rng-card ${rarityClass(card)} ${variantClasses} ${dominantTextClass} ${mode} ${extraClass}" title="${shownName} - ${formatOdds(card)}">
          <div class="card-name"><span class="card-text">${cardTitleHTML(card)}${glow}</span></div>
          <div class="odds-box"><span class="card-text">${formatOdds(card)}</span></div>
          <div class="emoji-box" aria-hidden="true">${card.emoji}</div>
          <div class="rarity-box"><span class="card-text">${card.rarity}</span></div>
        </article>
        ${countBadge}${lockBadge}
      `;
    }

    function lockedCardHTML(card) {
      return `
        <div class="locked-card" title="Locked card ${card.id}">
          <div>
            <div class="question">?</div>
            <div class="locked-detail">#${card.id} · ${card.rarity}</div>
          </div>
        </div>
      `;
    }

    function renderCard(card, mode = "flash") {
      startTitle.style.display = "none";
      cardStage.classList.remove("multi-show");
      cardStage.classList.add("show");
      if (mode === "special" && state.settings.rareReveal) {
        cardStage.innerHTML = `
          <div class="rare-frame">
            <div class="flip-inner">
              <div class="flip-face flip-back">?</div>
              <div class="flip-face flip-front">${fullCardHTML(card, "")}</div>
            </div>
          </div>
        `;
      } else {
        cardStage.innerHTML = fullCardHTML(card, mode);
      }
    }

    function renderRollCards(cards, mode = "flash") {
      const cleanCards = Array.isArray(cards) && cards.length ? cards : [];
      if (cleanCards.length <= 1) {
        const single = cleanCards[0];
        if (single) renderCard(single, mode);
        return;
      }
      startTitle.style.display = "none";
      cardStage.classList.add("show", "multi-show");
      const cols = Math.min(5, Math.max(1, cleanCards.length));
      cardStage.innerHTML = `
        <div class="roll-card-grid roll-count-${cleanCards.length}" style="--roll-cols:${cols}">
          ${cleanCards.map(card => `<div class="roll-card-wrap">${fullCardHTML(card, mode)}</div>`).join("")}
        </div>
      `;
    }

    function luckMultiplier() {
      let mult = 1 + ((Number(state.prestigeStars) || 0) * 0.02) + ((Number(state.upgrades.luckLevel) || 0) * 0.0025);
      const boost = state.activeBoosts.luck;
      if (boost && boost.until > Date.now()) mult *= Number(boost.mult) || 1;
      mult *= weatherMultiplier("luck");
      mult *= manualRollLuckMultiplier();
      return mult;
    }

    function sellMultiplier() {
      let mult = 1 + ((Number(state.prestigeStars) || 0) * 0.02) + ((Number(state.upgrades.sellBonusLevel) || 0) * 0.005);
      const boost = state.activeBoosts.coin;
      if (boost && boost.until > Date.now()) mult *= Number(boost.mult) || 1;
      mult *= weatherMultiplier("sell");
      return mult;
    }

    function hasHaste() { return state.activeBoosts.haste && state.activeBoosts.haste.until > Date.now(); }
    function rollSpeedMultiplier() {
      const speedBonus = Math.min(0.35, (Number(state.upgrades.rollSpeedLevel) || 0) * 0.004);
      let mult = Math.max(0.65, 1 - speedBonus);
      mult *= weatherMultiplier("rollSpeed");
      return Math.max(0.08, mult);
    }
    function rollCount() { return Math.max(1, Math.min(10, 1 + (Number(state.upgrades.multiLevel) || 0))); }
    function autoInterval() {
      const level = Number(state.upgrades.autoLevel) || 0;
      if (level <= 0) return (Number(state.prestigeTotal) || 0) > 0 ? 15000 : 0;
      return Math.max(5000, 12000 - (level - 1) * 300);
    }

    function pruneBoosts() {
      const now = Date.now();
      for (const key of Object.keys(state.activeBoosts || {})) {
        if (!state.activeBoosts[key] || state.activeBoosts[key].until <= now) delete state.activeBoosts[key];
      }
    }

    function pickFinalCard() {
      const luck = luckMultiplier();
      let totalWeight = 0;
      const weights = CARDS.map(card => {
        const baseNerf = card.id === 1 ? 1 : BASE_RARE_WEIGHT;
        const rarityScale = Math.log10(card.odds) / 9;
        const rarityFactor = 1 + ((luck - 1) * rarityScale);
        const weight = (1 / card.odds) * baseNerf * Math.max(0.001, rarityFactor);
        totalWeight += weight;
        return weight;
      });
      let cursor = Math.random() * totalWeight;
      for (let i = 0; i < CARDS.length; i++) {
        cursor -= weights[i];
        if (cursor <= 0) return CARDS[i];
      }
      return CARDS[0];
    }

    function pickFlashCard(frame, totalFrames) {
      const excitementCurve = frame / totalFrames;
      if (Math.random() < excitementCurve * 0.36) {
        const start = Math.floor(CARDS.length * 0.55);
        return CARDS[start + Math.floor(Math.random() * (CARDS.length - start))];
      }
      return CARDS[Math.floor(Math.random() * CARDS.length)];
    }

    function addPulledCardToState(card, countDaily = true) {
      if (!state.variantCounts) state.variantCounts = {};
      if (!state.lifetime) state.lifetime = { rarePulls: 0, sells: 0, buys: 0, unlocks: 0, uses: 0, variants: 0, upgradesBought: 0 };
      ensureDaily();
      const wasUnlocked = !!state.unlocked[card.id];
      const pulledKey = makeCardKey(card.id, card.variantIds);
      const baseKey = makeCardKey(card.id, []);
      const hadVariantVersion = normalizeVariantIds(card.variantIds).length ? (Number((state.variantCounts || {})[pulledKey]) || 0) > 0 : plainOwnedCount(card.id) > 0;
      state.rolls += 1;
      if (countDaily) state.daily.rolls += 1;
      state.lastId = card.id;
      state.lastVariant = normalizeVariantIds(card.variantIds);
      state.counts[card.id] = ownedCount(card.id) + 1;
      const key = makeCardKey(card.id, card.variantIds);
      if (normalizeVariantIds(card.variantIds).length) state.variantCounts[key] = (Number(state.variantCounts[key]) || 0) + 1;
      if (!state.newCards) state.newCards = {};
      if (!wasUnlocked) state.newCards[baseKey] = Date.now();
      if (normalizeVariantIds(card.variantIds).length && !hadVariantVersion) state.newCards[pulledKey] = Date.now();
      state.unlocked[card.id] = true;
      if (!wasUnlocked && countDaily) { state.daily.unlocks += 1; state.lifetime.unlocks += 1; }
      if (normalizeVariantIds(card.variantIds).length && countDaily) state.lifetime.variants += 1;
      if (isRarePlus(card) && countDaily) { state.daily.rarePulls += 1; state.lifetime.rarePulls += 1; }
      state.history.unshift({ id: card.id, variantIds: normalizeVariantIds(card.variantIds), time: Date.now() });
      return wasUnlocked ? 0 : 1;
    }

    function recordPulls(cards) {
      ensureDaily();
      let newestUnlocks = 0;
      for (const card of cards) newestUnlocks += addPulledCardToState(card, true);
      state.history = state.history.slice(0, 100);
      saveState();
      updateStats();
      if (currentMenu === "Collection") renderCollection();
      if (currentMenu === "Index") renderIndex();
      if (currentMenu === "Shop" && currentShopTab === "quests" && newestUnlocks > 0) renderShop("quests");
      else if (currentMenu === "Upgrades" && currentUpgradeTab === "quests" && newestUnlocks > 0) renderUpgrades("quests");
      refreshMenuUnlocks();
      checkMilestones();
    }

    function roll(isManual = false) {
      if (rolling) return;
      if (isManual) registerManualRollBonus();
      rolling = true;
      rollButton.disabled = true;
      rollButton.textContent = "Rolling...";
      cardStage.classList.add("show");
      startTitle.style.display = "none";
      const results = Array.from({ length: rollCount() }, () => rollCardResult());
      const finalCard = results.reduce((best, card) => card.odds > best.odds ? card : best, results[0]);
      const instantRoll = sunnyInstantRoll();
      const baseFrames = instantRoll ? 1 : state.settings.reduceFlash ? 9 : hasHaste() ? 16 : 28;
      const frames = Math.max(1, Math.round(baseFrames * rollSpeedMultiplier()));
      let frame = 0;
      function tick() {
        frame += 1;
        const displayCards = frame >= frames ? results : Array.from({ length: results.length }, () => makeVariantCard(pickFlashCard(frame, frames), []));
        if (results.length === 1 && frame >= frames && isSpecialReveal(finalCard)) renderCard(finalCard, "special");
        else renderRollCards(displayCards, frame >= frames ? "reveal" : "flash");
        if (frame < frames) {
          const normalDelay = instantRoll ? 0 : state.settings.reduceFlash ? 95 : hasHaste() ? 24 + Math.floor(frame * 1.3) : 34 + Math.floor(frame * 2.2);
          const delay = instantRoll ? 0 : Math.max(14, Math.round(normalDelay * rollSpeedMultiplier()));
          window.setTimeout(tick, delay);
        } else {
          recordPulls(results);
          rolling = false;
          rollButton.disabled = false;
          updateRollButtonText();
          if (state.settings.haptics && navigator.vibrate) navigator.vibrate(isSpecialReveal(finalCard) ? [35, 45, 35] : 25);
          if (state.settings.sound) playTone(normalizeVariantIds(finalCard.variantIds).length ? 920 : isSpecialReveal(finalCard) ? 720 : 420, 0.08);
          if (state.settings.screenShake && isSpecialReveal(finalCard)) {
            mainArea.classList.remove("shake");
            void mainArea.offsetWidth;
            mainArea.classList.add("shake");
          }
        }
      }
      tick();
    }

    function updateAutoLoop() {
      if (autoTimer) return;
      autoTimer = setInterval(() => {
        const interval = autoInterval();
        if (!state.autoRoll || interval <= 0) return;
        if (!nextAutoAt) nextAutoAt = Date.now() + interval;
        if (!rolling && Date.now() >= nextAutoAt) {
          nextAutoAt = Date.now() + interval;
          roll(false);
        }
      }, 500);
    }

    function renderBatched(container, items, renderer, batchSize = 28) {
      ++renderToken;
      container.innerHTML = items.map(item => renderer(item)).join("");
    }

    function unlockedUniqueCount() {
      return Object.keys(state.unlocked || {}).filter(id => state.unlocked[id]).length;
    }

    function totalCardCopies() {
      return Object.values(state.counts || {}).reduce((sum, value) => sum + Math.max(0, Number(value) || 0), 0);
    }

    function hasNewCards() {
      return !!(state.settings.newCardBadges && state.newCards && Object.keys(state.newCards).length);
    }

    function isNewCardKey(cardKey) {
      return !!(state.settings.newCardBadges && state.newCards && state.newCards[cardKey]);
    }

    function newBadgeHTML(card) {
      return isNewCardKey(makeCardKey(card.id, card.variantIds)) ? `<div class="new-badge">NEW</div>` : "";
    }

    function markCardSeen(card) {
      if (!state.seenCards) state.seenCards = {};
      if (!state.newCards) state.newCards = {};
      const key = makeCardKey(card.id, card.variantIds);
      state.seenCards[key] = true;
      if (state.newCards[key]) delete state.newCards[key];
      saveState();
      refreshMenuUnlocks();
    }

    function bagItemCount() {
      return Object.values(state.bag || {}).reduce((sum, value) => sum + Math.max(0, Number(value) || 0), 0);
    }

    function hasAnyUpgrade() {
      return Object.values(state.upgrades || {}).some(value => (Number(value) || 0) > 0);
    }

    function menuUnlockInfo(name) {
      const rolls = Number(state.rolls) || 0;
      const unique = unlockedUniqueCount();
      const copies = totalCardCopies();
      const money = Number(state.money) || 0;
      if (name === "Collection") return { unlocked: true, hint: "Collection is always available." };
      if (name === "Settings") return { unlocked: true, hint: "Settings are always available." };
      if (name === "Shop") return { unlocked: rolls >= 10 || copies >= 10 || Number(state.daily?.buys || 0) > 0, hint: "Shop unlocks after 10 rolls." };
      if (name === "Bag") return { unlocked: bagItemCount() > 0 || Number(state.daily?.buys || 0) > 0 || rolls >= 10, hint: "Bag unlocks after you buy or earn an item." };
      if (name === "Index") return { unlocked: unique >= 8 || rolls >= 25, hint: "Index unlocks at 8 discovered cards or 25 rolls." };
      if (name === "Upgrades") return { unlocked: rolls >= 100 || hasAnyUpgrade(), hint: "Upgrades unlock after 100 rolls." };
      return { unlocked: true, hint: "" };
    }

    function nextMenuUnlockHint() {
      const order = ["Shop", "Bag", "Index"];
      const next = order.find(name => !menuUnlockInfo(name).unlocked);
      if (next) return `Next unlock: ${next} — ${menuUnlockInfo(next).hint}`;
      if (!menuUnlockInfo("Upgrades").unlocked) return `Next shop tab: Upgrades — ${menuUnlockInfo("Upgrades").hint}`;
      return "All main menus unlocked.";
    }

    function refreshMenuUnlocks() {
      document.querySelectorAll(".menu-btn[data-menu]").forEach(button => {
        const info = menuUnlockInfo(button.dataset.menu);
        button.classList.toggle("locked-menu", !info.unlocked);
        button.classList.toggle("menu-notify", button.dataset.menu === "Collection" && hasNewCards());
        button.disabled = !info.unlocked;
        button.title = info.unlocked ? (button.dataset.menu === "Collection" && hasNewCards() ? "New cards waiting" : "") : info.hint;
      });
      const headingNote = document.querySelector(".menu-heading span:last-child");
      if (headingNote) headingNote.textContent = nextMenuUnlockHint();
      const home = document.getElementById("menuHome");
      if (home && !document.getElementById("unlockHint")) {
        const hint = document.createElement("div");
        hint.id = "unlockHint";
        hint.className = "unlock-hint";
        home.appendChild(hint);
      }
      const hint = document.getElementById("unlockHint");
      if (hint) hint.textContent = nextMenuUnlockHint();
      updateTopActionButtons();
    }

    function hasMythicOwned() {
      return ownedCardEntries().some(card => card.rarity === "Mythic");
    }

    function questsUnlocked() {
      return (Number(state.rolls) || 0) >= 125 || Object.values(state.daily?.claimed || {}).some(Boolean);
    }

    function canSeePrestige() {
      return hasMythicOwned() || (Number(state.prestigeStars) || 0) > 0 || (Number(state.prestigeTotal) || 0) > 0;
    }

    function updateTopActionButtons() {
      if (prestigeTopButton) {
        const show = canSeePrestige();
        prestigeTopButton.classList.toggle("hidden", !show);
        prestigeTopButton.textContent = prestigeGain() > 0 ? `⭐ +${compactNumber(prestigeGain())}` : "⭐ Prestige";
      }
      if (questTopButton) {
        const showQuest = questsUnlocked();
        questTopButton.classList.toggle("hidden", !showQuest);
        questTopButton.classList.toggle("menu-notify", showQuest && hasClaimableQuestOrAchievement());
        questTopButton.title = showQuest ? "Quests and achievements" : "Quests unlock after 125 rolls.";
      }
      if (statsTopButton) {
        statsTopButton.title = "Stats";
      }
      if (autoTopButton) {

        autoTopButton.classList.toggle("active", !!state.autoRoll);
        autoTopButton.textContent = state.autoRoll ? "🤖 Auto On" : "🤖 Auto Off";
        autoTopButton.title = showAuto ? `Offline/auto roll interval: ${formatTime(autoInterval())}` : "Auto Open unlocks after your first prestige.";
      }
    }

    const milestoneQueue = [];
    let milestoneShowing = false;
    function milestoneDefs() {
      return [
        { id: "shop10", emoji: "🛒", title: "Shop Unlocked", desc: "You reached 10 rolls. The Shop is open now, with stocked item slots and deals.", done: () => (Number(state.rolls) || 0) >= 10 },
        { id: "upgrades100", emoji: "⬆️", title: "Upgrades Unlocked", desc: "You reached 100 rolls. Permanent upgrades are now available as a Shop tab.", done: () => (Number(state.rolls) || 0) >= 100 },
        { id: "quests125", emoji: "📜", title: "Quests Unlocked", desc: "You reached 125 rolls. Daily quests are now inside the Shop tabs.", done: () => questsUnlocked() },
        { id: "prestigeMythic", emoji: "🌟", title: "Prestige Unlocked", desc: "You pulled your first Mythic. The Prestige button now appears in the top bar.", done: () => canSeePrestige() },
        { id: "autoAfterPrestige", emoji: "🤖", title: "Auto Button Unlocked", desc: "Your first prestige unlocked the Auto button in the top bar.", done: () => (Number(state.prestigeTotal) || 0) > 0 }
      ];
    }

    function checkMilestones() {
      if (!state.milestonesSeen) state.milestonesSeen = {};
      let changed = false;
      for (const milestone of milestoneDefs()) {
        if (!state.milestonesSeen[milestone.id] && milestone.done()) {
          state.milestonesSeen[milestone.id] = true;
          changed = true;
          if (state.settings.milestonePopups !== false) milestoneQueue.push(milestone);
        }
      }
      if (changed) saveState();
      updateTopActionButtons();
      showNextMilestone();
    }

    function showNextMilestone() {
      if (milestoneShowing || !milestoneQueue.length) return;
      milestoneShowing = true;
      const milestone = milestoneQueue.shift();
      let pop = document.getElementById("milestonePop");
      if (!pop) {
        pop = document.createElement("div");
        pop.id = "milestonePop";
        pop.className = "milestone-pop";
        document.body.appendChild(pop);
      }
      pop.innerHTML = `<div class="milestone-card"><div class="milestone-emoji">${milestone.emoji}</div><div class="milestone-title">${escapeHTML(milestone.title)}</div><div class="milestone-desc">${escapeHTML(milestone.desc)}</div><button type="button" class="small-action" id="milestoneOk">Nice</button></div>`;
      pop.classList.add("show");
      document.getElementById("milestoneOk").onclick = () => {
        pop.classList.remove("show");
        milestoneShowing = false;
        refreshMenuUnlocks();
        showNextMilestone();
      };
    }

    function ensureTutorialOverlay() {
      let overlay = document.getElementById("tutorialOverlay");
      if (!overlay) {
        overlay = document.createElement("div");
        overlay.id = "tutorialOverlay";
        overlay.className = "tutorial-overlay";
        overlay.setAttribute("role", "presentation");
        overlay.innerHTML = `<div class="tutorial-highlight" id="tutorialHighlight"></div><div class="tutorial-card" role="dialog" aria-modal="true" aria-labelledby="tutorialTitle" aria-describedby="tutorialText"></div>`;
        document.body.appendChild(overlay);
      }
      return overlay;
    }

    function activeTutorialTarget() {
      const step = TUTORIAL_STEPS[Math.max(0, Math.min(TUTORIAL_STEPS.length - 1, tutorialStepIndex))];
      if (!step || !step.target) return null;
      const candidates = Array.from(document.querySelectorAll(step.target));
      return candidates.find(el => {
        const rect = el.getBoundingClientRect();
        const style = window.getComputedStyle(el);
        return rect.width > 0 && rect.height > 0 && style.display !== "none" && style.visibility !== "hidden";
      }) || null;
    }

    function positionTutorialHighlight() {
      const overlay = document.getElementById("tutorialOverlay");
      const highlight = document.getElementById("tutorialHighlight");
      if (!overlay || !highlight || !overlay.classList.contains("show")) return;
      const target = activeTutorialTarget();
      if (!target) {
        highlight.style.display = "none";
        return;
      }
      const rect = target.getBoundingClientRect();
      const pad = 8;
      highlight.style.display = "block";
      highlight.style.left = `${Math.max(8, rect.left - pad)}px`;
      highlight.style.top = `${Math.max(8, rect.top - pad)}px`;
      highlight.style.width = `${Math.min(window.innerWidth - 16, rect.width + pad * 2)}px`;
      highlight.style.height = `${Math.min(window.innerHeight - 16, rect.height + pad * 2)}px`;
      const radius = Math.min(34, Math.max(14, parseFloat(window.getComputedStyle(target).borderRadius) || 22));
      highlight.style.borderRadius = `${radius + 6}px`;
    }

    function renderTutorialStep() {
      const overlay = ensureTutorialOverlay();
      const card = overlay.querySelector(".tutorial-card");
      const step = TUTORIAL_STEPS[tutorialStepIndex];
      const isFirst = tutorialStepIndex <= 0;
      const isLast = tutorialStepIndex >= TUTORIAL_STEPS.length - 1;
      card.innerHTML = `
        <div class="tutorial-kicker">Tutorial ${tutorialStepIndex + 1} / ${TUTORIAL_STEPS.length}</div>
        <div class="tutorial-title" id="tutorialTitle">${escapeHTML(step.title)}</div>
        <p class="tutorial-text" id="tutorialText">${escapeHTML(step.text)}</p>
        <div class="tutorial-tip">${escapeHTML(step.tip)}</div>
        <div class="tutorial-nav">
          <div class="tutorial-nav-left">
            <button type="button" class="small-action" id="tutorialSkip">Skip</button>
            <button type="button" class="small-action" id="tutorialPrev" ${isFirst ? "disabled" : ""}>Back</button>
          </div>
          <div class="tutorial-dots" aria-hidden="true">
            ${TUTORIAL_STEPS.map((_, index) => `<span class="tutorial-dot ${index === tutorialStepIndex ? "active" : ""}"></span>`).join("")}
          </div>
          <div class="tutorial-nav-right">
            <button type="button" class="small-action" id="tutorialNext">${isLast ? "Start Playing" : "Next"}</button>
          </div>
        </div>
      `;
      document.getElementById("tutorialSkip").onclick = () => finishTutorial(true);
      document.getElementById("tutorialPrev").onclick = () => showTutorial(tutorialStepIndex - 1);
      document.getElementById("tutorialNext").onclick = () => {
        if (isLast) finishTutorial(true);
        else showTutorial(tutorialStepIndex + 1);
      };
      window.requestAnimationFrame(positionTutorialHighlight);
    }

    function showTutorial(step = 0) {
      tutorialStepIndex = Math.max(0, Math.min(TUTORIAL_STEPS.length - 1, Number(step) || 0));
      const overlay = ensureTutorialOverlay();
      overlay.classList.add("show");
      document.body.classList.add("tutorial-active");
      renderTutorialStep();
      window.removeEventListener("resize", positionTutorialHighlight);
      window.addEventListener("resize", positionTutorialHighlight);
    }

    function finishTutorial(markSeen = true) {
      const overlay = document.getElementById("tutorialOverlay");
      if (overlay) overlay.classList.remove("show");
      document.body.classList.remove("tutorial-active");
      window.removeEventListener("resize", positionTutorialHighlight);
      if (markSeen) {
        state.tutorialSeen = true;
        saveState();
      }
    }

    function openMenu(name) {
      if (name === "Upgrades") {
        const unlock = menuUnlockInfo("Upgrades");
        if (!unlock.unlocked) { alert(unlock.hint); refreshMenuUnlocks(); return; }
        name = "Shop";
        currentShopTab = "upgrades";
      }

      clearBoostTimer();

      menuPanel.classList.add("show");
      if (name === "Shop") renderShop(currentShopTab);

      else if (name === "Index") renderIndex();

    function closeMenu() {
      currentMenu = null;
      ++renderToken;
      clearShopTimer();
      clearBoostTimer();
      menuBox.classList.remove("is-open");
      menuPanel.classList.remove("show");
      panelBody.innerHTML = "";
    }

    function pageInfoFor(key, totalItems) {
      const total = Math.max(0, Number(totalItems) || 0);
      const maxPage = Math.max(0, Math.ceil(total / PAGE_SIZE) - 1);
      const current = Math.max(0, Math.min(maxPage, Number(pageState[key]) || 0));
      pageState[key] = current;
      const start = current * PAGE_SIZE;
      const end = Math.min(total, start + PAGE_SIZE);
      return { key, total, page: current, maxPage, start, end };
    }

    function paginationHTML(info) {
      if (!info || info.total <= PAGE_SIZE) return "";
      return `
        <div class="pager-controls" data-page-key="${info.key}" data-total="${info.total}">
          <button type="button" class="small-action" data-page-action="first" ${info.page <= 0 ? "disabled" : ""}>First</button>
          <button type="button" class="small-action" data-page-action="prev" ${info.page <= 0 ? "disabled" : ""}>Prev</button>
          <div class="pager-info">Page ${info.page + 1} / ${info.maxPage + 1} · Cards ${info.start + 1}-${info.end} of ${info.total}</div>
          <button type="button" class="small-action" data-page-action="next" ${info.page >= info.maxPage ? "disabled" : ""}>Next</button>
          <button type="button" class="small-action" data-page-action="last" ${info.page >= info.maxPage ? "disabled" : ""}>Last</button>
        </div>
      `;
    }

    function attachPagination(root, key, renderFn) {
      const pager = root.querySelector(`[data-page-key="${key}"]`);
      if (!pager) return;
      pager.addEventListener("click", event => {
        const button = event.target.closest("[data-page-action]");
        if (!button || button.disabled) return;
        const currentInfo = pageInfoFor(key, Number(pager.dataset.total || 0));
        const action = button.dataset.pageAction;
        if (action === "first") pageState[key] = 0;
        else if (action === "prev") pageState[key] = currentInfo.page - 1;
        else if (action === "next") pageState[key] = currentInfo.page + 1;
        else if (action === "last") pageState[key] = currentInfo.maxPage;
        renderFn();
      });
    }


    function emptyStateHTML(emoji, title, text, action = "") {
      return `
        <div class="empty">
          <div class="empty-card">
            <div class="empty-emoji">${emoji}</div>
            <div class="empty-title">${escapeHTML(title)}</div>
            <div class="empty-text">${escapeHTML(text)}</div>
            ${action ? `<div class="empty-action">${escapeHTML(action)}</div>` : ""}
          </div>
        </div>
      `;
    }

        return;
      }
      const info = pageInfoFor("Collection", owned.length);
      const pageCards = owned.slice(info.start, info.end);
      panelBody.innerHTML = `

        <div class="library-grid" id="collectionGrid"></div>

      renderBatched(grid, pageCards, card => `<div class="card-cell collection-card ${isLocked(card.id) ? "locked-outline" : ""}" data-card-key="${makeCardKey(card.id, card.variantIds)}">${fullCardHTML(card, "", entryOwnedCount(card))}${newBadgeHTML(card)}<button type="button" class="lock-btn" data-lock-id="${card.id}">${isLocked(card.id) ? "Unlock" : "Lock"}</button></div>`, 18);

    function toggleLock(cardId) {
      if (!ownedCount(cardId)) return;
      if (state.locked[cardId]) delete state.locked[cardId];
      else state.locked[cardId] = true;
      saveState();
      if (currentMenu === "Collection") renderCollection();
      if (currentMenu === "Shop" && currentShopTab === "sell") renderShop("sell");
    }

    function bestOwnedVariantEntry(cardId, variantId) {
      let best = null;
      let bestScore = -1;
      for (const [key, qty] of Object.entries(state.variantCounts || {})) {
        const count = Number(qty) || 0;
        if (count <= 0) continue;
        const parsed = parseCardKey(key);
        if (Number(parsed.id) !== Number(cardId)) continue;
        const clean = normalizeVariantIds(parsed.variantIds);
        if (!clean.includes(variantId)) continue;
        const card = makeVariantCard(CARD_BY_ID.get(Number(cardId)), clean);
        const score = card.odds;
        if (score > bestScore) {
          bestScore = score;
          best = { card, count, key };
        }
      }
      return best;
    }
