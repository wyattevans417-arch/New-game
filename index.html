      document.getElementById("detailsSellAll").addEventListener("click", () => { sellSelected(makeCardKey(card.id, card.variantIds), owned, false); renderCardDetails(parsed, returnTo); });
    }

    function shopLuckMultiplier() { return 1 + ((Number(state.upgrades.shopLuckLevel) || 0) * 0.002) + ((Number(state.prestigeStars) || 0) * 0.01); }

    function ensureShop() {
      if (!state.shop || !Array.isArray(state.shop.items)) state.shop = { expiresAt: 0, items: [] };
      mergeShopSlots();
      if (Date.now() >= (Number(state.shop.expiresAt) || 0) || state.shop.items.length === 0) refreshShop(false);
    }

    function mergeShopSlots() {
      if (!state.shop || !Array.isArray(state.shop.items)) return;
      const merged = new Map();
      for (const slot of state.shop.items) {
        if (!slot || !slot.itemId) continue;
        if (!merged.has(slot.itemId)) merged.set(slot.itemId, { ...slot, stock: Math.max(0, Number(slot.stock) || 0), price: Math.max(1, Number(slot.price) || 1) });
        else {
          const existing = merged.get(slot.itemId);
          existing.stock += Math.max(0, Number(slot.stock) || 0);
          existing.price = Math.min(existing.price, Math.max(1, Number(slot.price) || existing.price));
        }
      }
      state.shop.items = Array.from(merged.values());
    }

    function refreshShop(save = true) {
      const items = [];
      const used = new Set();
      const targetSlots = Math.min(6, ITEM_IDS.length);
      let attempts = 0;
      while (items.length < targetSlots && attempts < 80) {
        attempts += 1;
        const template = weightedShopItem();
        if (!template || used.has(template.id)) continue;
        used.add(template.id);
        items.push(makeShopSlot(template, items.length));
      }
      if (items.length < targetSlots) {
        const remaining = ITEM_IDS
          .filter(id => !used.has(id))
          .sort(() => Math.random() - 0.5);
        for (const id of remaining) {
          if (items.length >= targetSlots) break;
          const template = ITEM_TEMPLATES[id];
          used.add(id);
          items.push(makeShopSlot(template, items.length));
        }
      }
      state.shop = { expiresAt: Date.now() + SHOP_DURATION, items };
      if (save) saveState();
    }

    function makeShopSlot(template, slot) {
      const labels = ["Featured Deal", "Potion Shelf", "Boost Shelf", "Upgrade Helper", "Mystery Slot", "Rare Find"];
      const rarityStock = { Common: 5, Uncommon: 3, Rare: 2, Epic: 1, Legendary: 1, Mythic: 1 }[template.rarity] || 1;
      const featured = slot === 0;
      const variance = featured ? 0.72 + Math.random() * 0.12 : 0.9 + Math.random() * 0.22;
      return {
        slotId: `${Date.now()}-${slot}-${Math.random().toString(16).slice(2)}`,
        itemId: template.id,
        label: labels[slot] || "Shop Slot",
        note: featured ? "Featured discount" : stockNoteForItem(template),
        stock: featured ? Math.max(rarityStock, 2) : rarityStock,
        price: Math.max(1, Math.round(template.price * variance))
      };
    }

    function stockNoteForItem(item) {
      if (item.duration) return `Timed boost for ${formatTime(item.duration)}`;
      if (item.rolls) return `${item.rolls} instant card pulls`;
      if (item.id.includes("stone")) return "Permanent progress item";
      return "Special utility item";
    }

    function weightedShopItem() {
      const shopLuck = shopLuckMultiplier();
      const total = ITEM_IDS.reduce((sum, id) => {
        const item = ITEM_TEMPLATES[id];
        const rareIndex = Math.max(0, RARITY_ORDER.indexOf(item.rarity));
        return sum + item.weight * (1 + ((shopLuck - 1) * rareIndex));
      }, 0);
      let cursor = Math.random() * total;
      for (const id of ITEM_IDS) {
        const item = ITEM_TEMPLATES[id];
        const rareIndex = Math.max(0, RARITY_ORDER.indexOf(item.rarity));
        cursor -= item.weight * (1 + ((shopLuck - 1) * rareIndex));
        if (cursor <= 0) return item;
      }
      return ITEM_TEMPLATES.lucky_potion;
    }

    function renderShop(tab = "buy") {
      const upgradeInfo = menuUnlockInfo("Upgrades");
      const upgradesReady = upgradeInfo.unlocked;
      const prestigeUnlocked = canSeePrestige();
      if (tab === "quests") tab = upgradesReady ? "upgrades" : "buy";
      if (tab === "upgrades" && !upgradesReady) tab = "buy";
      if (tab === "prestige" && !prestigeUnlocked) tab = upgradesReady ? "upgrades" : "buy";
      currentShopTab = tab;
      if (["upgrades", "quests", "prestige"].includes(tab)) currentUpgradeTab = tab;
      panelTitle.textContent = "Shop";
      ensureShop();
      const statusText = tab === "buy"
        ? `<div class="timer-pill">Refresh: <span id="shopTimer">--:--</span></div>`
        : tab === "prestige"
          ? `<div class="timer-pill">Stars: ${compactNumber(state.prestigeStars || 0)}</div>`
          : tab === "sell"
            ? `<div class="timer-pill">Safe Sell</div>`
            : `<div class="timer-pill">Money: ${moneyText(state.money)}</div>`;
      panelBody.innerHTML = `
        <div class="toolbar">
          <div class="shop-tabs">
            <button class="tab-btn ${tab === "buy" ? "active" : ""}" id="buyTab">Buy</button>
            <button class="tab-btn ${tab === "sell" ? "active" : ""}" id="shopSellTab">Sell</button>
            <button class="tab-btn ${tab === "upgrades" ? "active" : ""}" id="shopUpgradeTab" ${upgradesReady ? "" : "disabled"} title="${escapeHTML(upgradeInfo.hint)}">Upgrades</button>
            ${prestigeUnlocked ? `<button class="tab-btn ${tab === "prestige" ? "active" : ""}" id="shopPrestigeTab">Prestige</button>` : ""}
          </div>
          ${statusText}
        </div>
        <div id="shopContent"></div>
      `;
      document.getElementById("buyTab").addEventListener("click", () => renderShop("buy"));
      document.getElementById("shopSellTab").addEventListener("click", () => renderShop("sell"));
      const upgradeTab = document.getElementById("shopUpgradeTab");
      if (upgradeTab && upgradesReady) upgradeTab.addEventListener("click", () => renderShop("upgrades"));
      const prestigeTab = document.getElementById("shopPrestigeTab");
      if (prestigeTab) prestigeTab.addEventListener("click", () => renderShop("prestige"));

      if (tab === "buy") renderBuyTab();
      else if (tab === "sell") renderSellTab();
      else if (tab === "upgrades") renderShopUpgradeTab("upgrades");
      else if (tab === "prestige") renderShopUpgradeTab("prestige");
    }

    function renderShopUpgradeTab(tab = "upgrades") {
      clearShopTimer();
      const content = document.getElementById("shopContent");
      if (!content) return;
      content.innerHTML = `<div id="upgradeContent"></div>`;
      if (tab === "quests") renderQuests();
      else if (tab === "prestige") renderPrestige();
      else renderUpgradeList();
    }

    function rerenderUpgradePanel(tab = "upgrades") {
      if (currentMenu === "Shop") renderShop(tab === "quests" ? "upgrades" : tab);
      else if (currentMenu === "Quests") renderQuestPage(tab === "achievements" ? "achievements" : "quests");
      else renderUpgrades(tab);
    }

    function renderBuyTab() {
      const content = document.getElementById("shopContent");
      content.innerHTML = `
        <p class="note">Shop items stack into one stocked slot per item. Potions show the exact multiplier before you buy. Use the Sell tab or card details in Collection to turn extras into money.</p>
        <div class="shop-grid">
          ${state.shop.items.map(slot => itemShopHTML(slot)).join("")}
        </div>
      `;
      content.querySelectorAll("[data-buy-slot]").forEach(button => {
        button.addEventListener("click", () => buyShopItem(button.dataset.buySlot));
      });
      startShopTimer();
    }

    function itemShopHTML(slot) {
      const item = ITEM_TEMPLATES[slot.itemId];
      const canBuy = state.money >= slot.price && slot.stock > 0;
      return `
        <div class="item-card">
          <div class="item-top">
            <div><div class="shop-slot-label">${escapeHTML(slot.label || "Shop Slot")}</div><div class="item-emoji">${item.emoji}</div><div class="item-name">${item.name}</div></div>
            <div class="item-rarity ${rarityTextClass(item.rarity)}">${item.rarity}</div>
          </div>
          <div class="item-desc">${item.desc}</div>
          <div class="item-meta">${itemEffectText(item)}</div>
          <div class="item-meta">${escapeHTML(slot.note || "")} · Stock: x${slot.stock}</div>
          <button class="buy-btn" data-buy-slot="${slot.slotId}" ${canBuy ? "" : "disabled"}>Buy · <span class="price">${moneyText(slot.price)}</span></button>
        </div>
      `;
    }

    function buyShopItem(slotId) {
      const slot = state.shop.items.find(item => item.slotId === slotId);
      if (!slot) return;
      if (slot.stock <= 0) return;
      if (state.money < slot.price) {
        alert("Not enough money. Sell cards by clicking them in your Collection first.");
        return;
      }
      ensureDaily();
      state.money -= slot.price;
      slot.stock -= 1;
      state.bag[slot.itemId] = (Number(state.bag[slot.itemId]) || 0) + 1;
      state.daily.buys += 1;
      if (!state.lifetime) state.lifetime = { rarePulls: 0, sells: 0, buys: 0, unlocks: 0, uses: 0, variants: 0, upgradesBought: 0 };
      state.lifetime.buys += 1;
      saveState();
      updateStats();
      if (state.settings.sound) playTone(580, 0.05);
      renderShop("buy");
    }

    function startShopTimer() {
      clearShopTimer();
      function tick() {
        const remaining = Math.max(0, state.shop.expiresAt - Date.now());
        const target = document.getElementById("shopTimer");
        if (target) target.textContent = formatTime(remaining);
        if (remaining <= 0) {
          refreshShop();
          if (currentMenu === "Shop" && currentShopTab === "buy") renderShop("buy");
        }
      }
      tick();
      shopTimer = setInterval(tick, 1000);
    }
    function clearShopTimer() { if (shopTimer) clearInterval(shopTimer); shopTimer = null; }
    function clearBoostTimer() { if (boostTimer) clearInterval(boostTimer); boostTimer = null; }
    function formatTime(ms) {
      const total = Math.max(0, Math.ceil(ms / 1000));
      const m = Math.floor(total / 60);
      const s = total % 60;
      return `${m}:${s.toString().padStart(2, "0")}`;
    }

    function itemEffectText(item) {
      if (!item) return "";
      if (item.id === "lucky_potion") return `Effect: Luck multiplier x${item.mult} for ${formatTime(item.duration)}.`;
      if (item.id === "mega_luck") return `Effect: Luck multiplier x${item.mult} for ${formatTime(item.duration)}.`;
      if (item.id === "coin_potion") return `Effect: Sell money multiplier x${item.mult} for ${formatTime(item.duration)}.`;
      if (item.id === "haste_charm") return `Effect: Faster roll animation for ${formatTime(item.duration)}.`;
      if (item.id === "variant_charm") return `Effect: Variant chance multiplier x${item.mult} for ${formatTime(item.duration)}.`;
      if (item.id === "card_pack") return `Effect: Opens ${item.rolls} instant card roll(s) and keeps them.`;
      if (item.id === "luck_stone") return "Effect: Permanent +1 Needle Luck level (+0.25% rare-card weighting).";
      if (item.id === "value_stone") return "Effect: Permanent +1 Sell Bonus level (+0.5% card sell value).";
      if (item.id === "upgrade_stone") return "Effect: 10% off your next permanent upgrade purchase.";
      if (item.id === "nametag") return "Effect: Rename one owned card.";
      if (item.id === "mystery_crate") return "Effect: Opens into one random shop item.";
      if (item.id === "mythic_tag") return "Effect: Adds a glow nameplate to one owned card.";
      return "Effect details unavailable.";
    }

    function baseSellPrice(card) { return Math.max(1, Math.floor(card.odds / 20)); }

    function sellPrice(card, qty = 1) { return Math.floor(baseSellPrice(card) * qty * sellMultiplier()); }

    function sellableCards() {
      return ownedCardEntries().filter(card => entryOwnedCount(card) > 0 && !isLocked(card.id)).sort((a, b) => b.odds - a.odds || a.id - b.id);
    }

    function renderSellTab() {
      clearShopTimer();
      const owned = ownedCardEntries();
      const sellable = sellableCards();
      if (selectedSellId && !sellable.some(card => makeCardKey(card.id, card.variantIds) === String(selectedSellId))) selectedSellId = null;
      const content = document.getElementById("shopContent");
      if (!owned.length) {
        content.innerHTML = emptyStateHTML("💰", "Nothing to sell yet", "Roll cards first. After you own duplicates, choose a card here, set a quantity, and sell it for money.", "Locked cards are always protected.");
        return;
      }
      if (!sellable.length) {
        content.innerHTML = emptyStateHTML("🔒", "Every card is protected", "All owned cards are locked, so the sell page will not touch them. Open Collection and unlock a card before selling.", "Lock favorites, unlock extras.");
        return;
      }
      if (!selectedSellId) selectedSellId = makeCardKey(sellable[0].id, sellable[0].variantIds);
      const chosen = sellable.find(card => makeCardKey(card.id, card.variantIds) === String(selectedSellId)) || sellable[0];
      selectedSellId = makeCardKey(chosen.id, chosen.variantIds);
      const info = pageInfoFor("Sell", owned.length);
      const pageCards = owned.slice(info.start, info.end);
      content.innerHTML = `
        <div class="sell-controls">
          <div class="sell-line">
            <div class="sell-summary">
              <strong>Selected card</strong>
              <span class="sell-selected-name">${escapeHTML(cardTitle(chosen))}</span>
              <span class="item-meta">Owned: x${entryOwnedCount(chosen)} · Value each: ${moneyText(sellPrice(chosen, 1))}</span>
            </div>
          </div>
          <div class="sell-line">
            <label for="sellQty">Copies to sell</label>
            <input class="sell-input" id="sellQty" type="number" min="1" max="${entryOwnedCount(chosen)}" value="1" />
            <button type="button" class="small-action" id="maxSell">Max copies</button>
            <button type="button" class="sell-btn" id="sellButton">Sell selected · <span id="sellTotal">${moneyText(sellPrice(chosen, 1))}</span></button>
          </div>
          <div class="sell-help">Tap a card below to choose what gets sold. Locked cards stay safe, and variant cards are worth more because their odds multiply sell value.</div>
        </div>
        <div class="sell-grid" id="sellGrid"></div>
        ${paginationHTML(info)}
      `;
      const qtyInput = document.getElementById("sellQty");
      const totalLabel = document.getElementById("sellTotal");
      function updateSellTotal() {
        const qty = clampQuantity(qtyInput.value, entryOwnedCount(chosen));
        qtyInput.value = qty;
        totalLabel.textContent = moneyText(sellPrice(chosen, qty));
      }
      qtyInput.addEventListener("input", updateSellTotal);
      document.getElementById("maxSell").addEventListener("click", () => { qtyInput.value = entryOwnedCount(chosen); updateSellTotal(); });
      document.getElementById("sellButton").addEventListener("click", () => sellSelected(makeCardKey(chosen.id, chosen.variantIds), clampQuantity(qtyInput.value, entryOwnedCount(chosen))));
      const grid = document.getElementById("sellGrid");
      grid.addEventListener("click", event => {
        const cell = event.target.closest("[data-sell-key]");
        if (!cell) return;
        const parsed = parseCardKey(cell.dataset.sellKey);
        if (isLocked(parsed.id)) return;
        selectedSellId = cell.dataset.sellKey;
        renderShop("sell");
      });
      attachPagination(content, "Sell", () => renderShop("sell"));
      renderBatched(grid, pageCards, card => `<div class="card-cell selectable ${makeCardKey(card.id, card.variantIds) === String(selectedSellId) ? "selected" : ""} ${isLocked(card.id) ? "locked-outline disabled-cell" : ""}" data-sell-key="${makeCardKey(card.id, card.variantIds)}">${fullCardHTML(card, "", entryOwnedCount(card))}<div class="select-badge">${isLocked(card.id) ? "Locked" : "Select"}</div></div>`, 18);
    }

    function clampQuantity(value, max) {
      const qty = Math.floor(Number(value) || 1);
      return Math.max(1, Math.min(max, qty));
    }

    function sellSelected(cardKey, qty, rerender = true) {
      const parsed = parseCardKey(cardKey);
      const base = CARD_BY_ID.get(parsed.id);
      if (!base) return;
      const card = makeVariantCard(base, parsed.variantIds);
      if (!card || qty <= 0 || entryOwnedCount(card) < qty || isLocked(card.id)) return;
      if (state.settings.confirmRareSell && card.odds >= 1000000) {
        const ok = confirm(`Sell ${qty}x ${cardTitle(card)} for ${moneyText(sellPrice(card, qty))}? This is a very rare card/version.`);
        if (!ok) return;
      }
      doSell([{ card, qty }]);
      if (rerender) renderShop("sell");
    }

    function bulkSell(mode) {
      const requested = String(mode || "").trim();
      const jobs = [];
      for (const card of ownedCardEntries()) {
        if (isLocked(card.id)) continue;
        const count = entryOwnedCount(card);
        if (count <= 0) continue;
        let qty = 0;
        if (requested === "duplicates") qty = Math.max(0, count - 1);
        else if (requested === "all") qty = count;
        else if (card.rarity.toLowerCase() === requested.toLowerCase()) qty = count;
        if (qty > 0) jobs.push({ card, qty });
      }
      if (!jobs.length) { alert("No unlocked cards match that bulk sell option."); return; }
      const totalQty = jobs.reduce((sum, job) => sum + job.qty, 0);
      const totalMoney = jobs.reduce((sum, job) => sum + sellPrice(job.card, job.qty), 0);
      const includesVeryRare = jobs.some(job => job.card.odds >= 1000000);
      if ((state.settings.confirmBulkSell || includesVeryRare) && !confirm(`Sell ${totalQty} unlocked card(s) for ${moneyText(totalMoney)}? Locked cards will stay safe.`)) return;
      doSell(jobs);
      selectedSellId = null;
      if (currentMenu === "Shop") renderShop("sell");
    }

    function doSell(jobs) {
      ensureDaily();
      if (!state.variantCounts) state.variantCounts = {};
      let totalMoney = 0;
      let totalQty = 0;
      for (const { card, qty } of jobs) {
        const safeQty = Math.min(qty, entryOwnedCount(card));
        if (safeQty <= 0) continue;
        const key = makeCardKey(card.id, card.variantIds);
        if (normalizeVariantIds(card.variantIds).length) {
          state.variantCounts[key] = (Number(state.variantCounts[key]) || 0) - safeQty;
          if (state.variantCounts[key] <= 0) delete state.variantCounts[key];
        }
        state.counts[card.id] = ownedCount(card.id) - safeQty;
        if (state.counts[card.id] <= 0) delete state.counts[card.id];
        totalMoney += sellPrice(card, safeQty);
        totalQty += safeQty;
      }
      state.money += totalMoney;
      state.daily.sells += totalQty;
      if (!state.lifetime) state.lifetime = { rarePulls: 0, sells: 0, buys: 0, unlocks: 0, uses: 0, variants: 0, upgradesBought: 0 };
      state.lifetime.sells += totalQty;
      saveState();
      updateStats();
      if (state.settings.sound) playTone(340, 0.06);
    }

    function renderBag() {
      clearShopTimer();
      panelTitle.textContent = "Bag";
      const itemEntries = Object.entries(state.bag).filter(([, qty]) => Number(qty) > 0);
      panelBody.innerHTML = `
        <div class="boost-list" id="boostList"></div>
        ${itemEntries.length ? `<div class="bag-grid">${itemEntries.map(([id, qty]) => bagItemHTML(id, qty)).join("")}</div>` : emptyStateHTML("🎒", "Your Bag is empty", "Usable items from the Shop, quests, crates, and rewards appear here. Buy or earn an item first, then come back to activate it.", "Shop items stack here.")}
      `;
      renderBoostList();
      panelBody.querySelectorAll("[data-use-item]").forEach(button => button.addEventListener("click", () => useItem(button.dataset.useItem)));
      boostTimer = setInterval(() => { renderBoostList(); updateStats(); }, 1000);
    }

    function bagItemHTML(id, qty) {
      const item = ITEM_TEMPLATES[id];
      if (!item) return "";
      return `
        <div class="item-card">
          <div class="item-top"><div><div class="item-emoji">${item.emoji}</div><div class="item-name">${item.name}</div></div><div class="item-rarity ${rarityTextClass(item.rarity)}">${item.rarity}</div></div>
          <div class="item-desc">${item.desc}</div>
          <div class="item-meta">${itemEffectText(item)}</div>
          <div class="item-meta">Owned: x${compactNumber(qty)}</div>
          <button class="use-btn" data-use-item="${id}">Use</button>
        </div>
      `;
    }

    function renderBoostList() {
      const list = document.getElementById("boostList");
      if (!list) return;
      pruneBoosts();
      const chips = [];
      if (state.activeBoosts.luck) chips.push(`🍀 Luck x${state.activeBoosts.luck.mult} · ${formatTime(state.activeBoosts.luck.until - Date.now())}`);
      if (state.activeBoosts.coin) chips.push(`💰 Sell x${state.activeBoosts.coin.mult} · ${formatTime(state.activeBoosts.coin.until - Date.now())}`);
      if (state.activeBoosts.haste) chips.push(`⚡ Haste · ${formatTime(state.activeBoosts.haste.until - Date.now())}`);
      if (state.activeBoosts.variant) chips.push(`🧿 Variant x${state.activeBoosts.variant.mult} · ${formatTime(state.activeBoosts.variant.until - Date.now())}`);
      chips.push(`🍀 Luck Lv.${state.upgrades.luckLevel || 0}`);
      chips.push(`💰 Sell Lv.${state.upgrades.sellBonusLevel || 0}`);
      const event = activeWeatherEvent();
      if (event) chips.push(`${event.emoji} ${event.name} · ${event.desc.replace(/ during this event\.?| while this event is active\.?/i, "")}`);
      chips.push(`🤖 Auto ${state.autoRoll ? "On" : "Off"}`);
      list.innerHTML = chips.map(text => `<div class="boost-chip">${text}</div>`).join("");
    }

    function useItem(id) {
      if (!state.bag[id] || state.bag[id] <= 0) return;
      ensureDaily();
      const item = ITEM_TEMPLATES[id];
      if (!item) return;
      let consumed = true;
      if (id === "lucky_potion" || id === "mega_luck") setTimedBoost("luck", item.mult, item.duration);
      else if (id === "coin_potion") setTimedBoost("coin", item.mult, item.duration);
      else if (id === "haste_charm") setTimedBoost("haste", 1, item.duration);
      else if (id === "variant_charm") setTimedBoost("variant", item.mult, item.duration);
      else if (id === "card_pack") {
        const packResults = Array.from({ length: item.rolls || 5 }, () => rollCardResult());
        const best = packResults.reduce((a, b) => b.odds > a.odds ? b : a, packResults[0]);
        recordPulls(packResults);
        renderCard(best, isSpecialReveal(best) ? "special" : "reveal");
        alert(`Quick Card Pack opened ${packResults.length} cards. Best: ${cardTitle(best)} (${formatOdds(best)}).`);
      }
      else if (id === "luck_stone") state.upgrades.luckLevel = Math.min(UPGRADE_DEFS.luckLevel.max, (Number(state.upgrades.luckLevel) || 0) + 1);
      else if (id === "value_stone") state.upgrades.sellBonusLevel = Math.min(UPGRADE_DEFS.sellBonusLevel.max, (Number(state.upgrades.sellBonusLevel) || 0) + 1);
      else if (id === "upgrade_stone") state.upgradeDiscounts = (Number(state.upgradeDiscounts) || 0) + 1;
      else if (id === "nametag") consumed = useNametag(false);
      else if (id === "mythic_tag") consumed = useNametag(true);
      else if (id === "mystery_crate") {
        const reward = weightedShopItem();
        state.bag[reward.id] = (Number(state.bag[reward.id]) || 0) + 1;
        alert(`Mystery Crate gave you: ${reward.emoji} ${reward.name}!`);
      }
      if (!consumed) return;
      state.bag[id] -= 1;
      if (state.bag[id] <= 0) delete state.bag[id];
      state.daily.uses += 1;
      if (!state.lifetime) state.lifetime = { rarePulls: 0, sells: 0, buys: 0, unlocks: 0, uses: 0, variants: 0, upgradesBought: 0 };
      state.lifetime.uses += 1;
      saveState();
      updateStats();
      if (state.settings.sound) playTone(650, 0.06);
      renderBag();
    }

    function setTimedBoost(key, mult, duration) {
      const now = Date.now();
      const currentUntil = state.activeBoosts[key]?.until || now;
      state.activeBoosts[key] = { mult, until: Math.max(now, currentUntil) + duration };
    }

    function useNametag(glowOnly) {
      const owned = CARDS.filter(card => ownedCount(card.id) > 0);
      if (!owned.length) { alert("You need to own a card before using this."); return false; }
      const answer = prompt("Enter the card ID or exact card name you want to tag:");
      if (!answer) return false;
      const card = owned.find(c => String(c.id) === answer.trim() || c.baseName.toLowerCase() === answer.trim().toLowerCase() || cardName(c).toLowerCase() === answer.trim().toLowerCase());
      if (!card) { alert("Could not find that owned card."); return false; }
      if (glowOnly) {
        state.glows[card.id] = true;
        return true;
      }
      const newName = prompt(`New name for ${cardName(card)}:`);
      if (!newName || !newName.trim()) return false;
      state.names[card.id] = newName.trim().slice(0, 28);
      return true;
    }

    function renderUpgrades(tab = "upgrades") {
      clearShopTimer();
      const prestigeUnlocked = canSeePrestige();
      const questReady = questsUnlocked();
      if (tab === "prestige" && !prestigeUnlocked) tab = "upgrades";
      if (tab === "quests" && !questReady) tab = "upgrades";
      currentUpgradeTab = tab;
      panelTitle.textContent = "Upgrades";
      panelBody.innerHTML = `
        <div class="toolbar">
          <div class="shop-tabs">
            <button class="tab-btn ${tab === "upgrades" ? "active" : ""}" id="upgradeTab">Upgrades</button>
            ${questReady ? `<button class="tab-btn ${tab === "quests" ? "active" : ""}" id="questTab">Quests</button>` : ""}
            ${prestigeUnlocked ? `<button class="tab-btn ${tab === "prestige" ? "active" : ""}" id="prestigeTab">Prestige</button>` : ""}
          </div>
          <div class="timer-pill">${prestigeUnlocked ? `Stars: ${compactNumber(state.prestigeStars || 0)}` : "Prestige unlocks later"}</div>
        </div>
        <div id="upgradeContent"></div>
      `;
      document.getElementById("upgradeTab").addEventListener("click", () => renderUpgrades("upgrades"));
      const questTab = document.getElementById("questTab");
      if (questTab) questTab.addEventListener("click", () => renderUpgrades("quests"));
      const prestigeTab = document.getElementById("prestigeTab");
      if (prestigeTab) prestigeTab.addEventListener("click", () => renderUpgrades("prestige"));
      if (tab === "upgrades") renderUpgradeList();
      else if (tab === "quests") renderQuests();
      else renderPrestige();
    }

    function upgradeCost(key) {
      const def = UPGRADE_DEFS[key];
      const level = Number(state.upgrades[key]) || 0;
      let cost = Math.floor(def.base * Math.pow(def.growth, level));
      if ((Number(state.upgradeDiscounts) || 0) > 0) cost = Math.floor(cost * 0.9);
      return Math.max(1, cost);
    }

    function renderUpgradeList() {
      const content = document.getElementById("upgradeContent");
      const autoUnlocked = autoInterval() > 0;
      content.innerHTML = `
        <p class="note">Permanent upgrades start affordable and scale harder over time. Quests unlock at 125 rolls. Prestige appears in the top bar after your first Mythic.</p>
        <div class="boost-list">
          <div class="boost-chip">Rolls per click: x${rollCount()}</div>
          <div class="boost-chip">Luck: x${luckMultiplier().toFixed(4)}</div>
          <div class="boost-chip">Sell: x${sellMultiplier().toFixed(3)}</div>
          <div class="boost-chip">Auto interval: ${autoUnlocked ? formatTime(autoInterval()) : "Locked"}</div>
          <div class="boost-chip">Prestige Stars: ${compactNumber(state.prestigeStars || 0)}</div>
          <div class="boost-chip">Upgrade discounts: x${state.upgradeDiscounts || 0}</div>
        </div>
        ${autoUnlocked ? `<div class="item-card auto-card"><div class="item-top"><div><div class="item-emoji">🤖</div><div class="item-name">Auto Open</div></div><div class="item-rarity">${state.autoRoll ? "ON" : "OFF"}</div></div><div class="item-desc">Automatically rolls every ${formatTime(autoInterval())}. It uses your Multi Roll level too. Offline rolling only runs after your first prestige while Auto Open is turned on.</div><button class="use-btn" id="toggleAuto">${state.autoRoll ? "Turn Auto Open Off" : "Turn Auto Open On"}</button></div>` : ""}
        <div class="upgrade-grid">
          ${Object.keys(UPGRADE_DEFS).map(key => upgradeCardHTML(key)).join("")}
        </div>
      `;
      const toggle = document.getElementById("toggleAuto");
      if (toggle) toggle.addEventListener("click", () => {
        state.autoRoll = !state.autoRoll;
        nextAutoAt = 0;
        saveState();
        updateStats();
        rerenderUpgradePanel("upgrades");
      });
      content.querySelectorAll("[data-buy-upgrade]").forEach(button => button.addEventListener("click", () => buyUpgrade(button.dataset.buyUpgrade)));
    }

    function upgradeCardHTML(key) {
      const def = UPGRADE_DEFS[key];
      const level = Number(state.upgrades[key]) || 0;
      const maxed = level >= def.max;
      const cost = upgradeCost(key);
      const canBuy = state.money >= cost && !maxed;
      return `
        <div class="upgrade-card">
          <div class="item-top"><div><div class="item-emoji">${def.icon}</div><div class="item-name">${def.name}</div></div><div class="item-rarity">Lv.${level}/${def.max}</div></div>
          <div class="item-desc">${def.desc}</div>
          <div class="upgrade-meter"><div style="width:${Math.min(100, (level / def.max) * 100)}%"></div></div>
          <button class="buy-btn" data-buy-upgrade="${key}" ${canBuy ? "" : "disabled"}>${maxed ? "Maxed" : `Upgrade · ${moneyText(cost)}`}</button>
        </div>
      `;
    }

    function buyUpgrade(key) {
      const def = UPGRADE_DEFS[key];
      if (!def) return;
      const level = Number(state.upgrades[key]) || 0;
      if (level >= def.max) return;
      const cost = upgradeCost(key);
      if (state.money < cost) return;
      state.money -= cost;
      state.upgrades[key] = level + 1;
      if ((Number(state.upgradeDiscounts) || 0) > 0) state.upgradeDiscounts -= 1;
      if (!state.lifetime) state.lifetime = { rarePulls: 0, sells: 0, buys: 0, unlocks: 0, uses: 0, variants: 0, upgradesBought: 0 };
      state.lifetime.upgradesBought += 1;
      if (key === "autoLevel" && state.upgrades[key] === 1 && (Number(state.prestigeTotal) || 0) > 0) state.autoRoll = true;
      saveState();
      updateStats();
      if (state.settings.sound) playTone(500, 0.05);
      rerenderUpgradePanel("upgrades");
      checkMilestones();
    }

    function prestigeGain() {
      const highestOdds = ownedCardEntries().reduce((best, card) => Math.max(best, card.odds), 0);
      const score = (Number(state.rolls) || 0) / 250 + Math.log10(Math.max(1, state.money) + 1) + Math.log10(highestOdds + 1);
      return Math.max(0, Math.floor(score / 6) - 1);
    }

    function renderPrestige() {
      const content = document.getElementById("upgradeContent");
      const gain = prestigeGain();
      const starBonus = 1 + ((Number(state.prestigeStars) || 0) * 0.02);
      content.innerHTML = `
        <div class="prestige-card">
          <div class="item-top"><div><div class="item-emoji">🌟</div><div class="item-name">Prestige / Rebirth</div></div><div class="item-rarity">Stars: ${compactNumber(state.prestigeStars || 0)}</div></div>
          <div class="item-desc">Prestige resets money, cards, bag, shop, quests, and upgrades, but gives Stars. Each Star gives permanent +2% luck and +2% sell value, plus +1% shop luck.</div>
          <div class="boost-list"><div class="boost-chip">Current star multiplier: x${starBonus.toFixed(2)}</div><div class="boost-chip">Stars gained now: +${compactNumber(gain)}</div><div class="boost-chip">Total prestiges: ${compactNumber(state.prestigeTotal || 0)}</div></div>
          <button type="button" class="small-action danger" id="prestigeButton" ${gain > 0 ? "" : "disabled"}>Prestige for +${compactNumber(gain)} Stars</button>
          <div class="item-desc">Need more progress? Roll more, earn money, and pull rarer/variant cards to increase prestige gain.</div>
        </div>
      `;
      const button = document.getElementById("prestigeButton");
      if (button) button.addEventListener("click", () => {
        if (gain <= 0) return;
        if (!confirm(`Prestige now for +${gain} Stars? This resets your run but keeps settings and Stars.`)) return;
        if (!confirm("Final confirmation: reset this run for Prestige Stars?")) return;
        performPrestige(gain);
      });
    }

    function performPrestige(gain) {
      const keepSettings = { ...state.settings };
      const keepAchievements = state.achievements && typeof state.achievements === "object" ? { ...state.achievements, claimed: { ...(state.achievements.claimed || {}) } } : { claimed: {} };
      const keepLifetime = state.lifetime && typeof state.lifetime === "object" ? { ...state.lifetime } : { rarePulls: 0, sells: 0, buys: 0, unlocks: 0, uses: 0, variants: 0, upgradesBought: 0 };
      const keepStars = (Number(state.prestigeStars) || 0) + gain;
      const keepTotal = (Number(state.prestigeTotal) || 0) + 1;
      state = defaultState();
      state.settings = keepSettings;
      state.achievements = keepAchievements;
      state.lifetime = keepLifetime;
      state.prestigeStars = keepStars;
      state.prestigeTotal = keepTotal;
      state.autoRoll = true;
      saveState();
      selectedSellId = null;
      pageState = { Collection: 0, Index: 0, Sell: 0 };
      nextAutoAt = 0;
      applySettings();
      ensureShop();
      updateStats();
      refreshMenuUnlocks();
      rerenderUpgradePanel("upgrades");
    }


    function statValue(stat) {
      ensureDaily();
      const lifetime = state.lifetime || {};
      if (stat === "rolls") return Number(state.rolls) || 0;
      if (stat === "unlocks") return unlockedUniqueCount();
      if (stat === "rarePulls") return Math.max(Number(lifetime.rarePulls) || 0, Number(state.daily?.rarePulls) || 0);
      if (stat === "sells") return Math.max(Number(lifetime.sells) || 0, Number(state.daily?.sells) || 0);
      if (stat === "buys") return Math.max(Number(lifetime.buys) || 0, Number(state.daily?.buys) || 0);
      if (stat === "uses") return Math.max(Number(lifetime.uses) || 0, Number(state.daily?.uses) || 0);
      if (stat === "variants") return Math.max(Number(lifetime.variants) || 0, Object.values(state.variantCounts || {}).reduce((sum, qty) => sum + (Number(qty) || 0), 0));
      if (stat === "upgradesBought") return Math.max(Number(lifetime.upgradesBought) || 0, Object.values(state.upgrades || {}).reduce((sum, level) => sum + (Number(level) || 0), 0));
      if (stat === "prestiges") return Number(state.prestigeTotal) || 0;
      return Number(lifetime[stat]) || 0;
    }

    function hasClaimableQuestOrAchievement() {
      ensureDaily();
      const hasQuest = questsUnlocked() && QUEST_DEFS.some(q => !state.daily.claimed[q.id] && questProgress(q) >= q.target);
      const hasAchievement = questsUnlocked() && ACHIEVEMENT_DEFS.some(a => !(state.achievements?.claimed || {})[a.id] && achievementProgress(a) >= a.target);
      return hasQuest || hasAchievement;
    }

    function renderQuestPage(tab = "quests") {
      clearShopTimer();
      clearBoostTimer();
      if (!questsUnlocked()) { alert("Quests unlock after 125 rolls."); return; }
      currentMenu = "Quests";
      panelTitle.textContent = "Quests";
      menuBox.classList.add("is-open");
      menuPanel.classList.add("show");
      panelBody.innerHTML = `
        <div class="toolbar">
          <div class="shop-tabs">
            <button class="tab-btn ${tab === "quests" ? "active" : ""}" id="questDailyTab">Quests</button>
            <button class="tab-btn ${tab === "achievements" ? "active" : ""}" id="achievementTab">Achievements</button>
          </div>
          <div class="timer-pill">${hasClaimableQuestOrAchievement() ? "Reward ready" : "Progress"}</div>
        </div>
        <div id="upgradeContent"></div>
      `;
      document.getElementById("questDailyTab").addEventListener("click", () => renderQuestPage("quests"));
      document.getElementById("achievementTab").addEventListener("click", () => renderQuestPage("achievements"));
      if (tab === "achievements") renderAchievements();
      else renderQuests();
    }

    function renderStats() {
      clearShopTimer();
      clearBoostTimer();
      panelTitle.textContent = "Stats";
      menuBox.classList.add("is-open");
      menuPanel.classList.add("show");
      const unique = unlockedUniqueCount();
      const copies = totalCardCopies();
      const variants = Object.values(state.variantCounts || {}).reduce((sum, qty) => sum + (Number(qty) || 0), 0);
      const best = ownedCardEntries().reduce((top, card) => !top || card.odds > top.odds ? card : top, null);
      const upgradeLevels = Object.values(state.upgrades || {}).reduce((sum, level) => sum + (Number(level) || 0), 0);
      const rows = [
        { name: "Collection", value: unique, max: CARDS.length, label: `${unique}/${CARDS.length}` },
        { name: "Rolls", value: Number(state.rolls) || 0, max: Math.max(1000, Number(state.rolls) || 0), label: compactNumber(state.rolls) },
        { name: "Copies", value: copies, max: Math.max(250, copies), label: compactNumber(copies) },
        { name: "Variants", value: variants, max: Math.max(25, variants), label: compactNumber(variants) },
        { name: "Rare+ pulls", value: statValue("rarePulls"), max: Math.max(50, statValue("rarePulls")), label: compactNumber(statValue("rarePulls")) },
        { name: "Upgrades", value: upgradeLevels, max: Math.max(50, upgradeLevels), label: compactNumber(upgradeLevels) },
        { name: "Manual Bonus", value: manualRollBonusPercent(), max: Math.max(50, manualRollBonusPercent()), label: `+${manualRollBonusPercent().toFixed(2)}%` }
      ];
      panelBody.innerHTML = `
        <div class="stats-grid">
          ${statCardHTML("Money", moneyText(state.money))}
          ${statCardHTML("Rolls", compactNumber(state.rolls))}
          ${statCardHTML("Owned", `${unique} / ${CARDS.length}`)}
          ${statCardHTML("Total Copies", compactNumber(copies))}
          ${statCardHTML("Variant Copies", compactNumber(variants))}
          ${statCardHTML("Best Pull", best ? `${cardTitle(best)} · ${formatOdds(best)}` : "None")}
          ${statCardHTML("Sells", compactNumber(statValue("sells")))}
          ${statCardHTML("Buys", compactNumber(statValue("buys")))}
          ${statCardHTML("Items Used", compactNumber(statValue("uses")))}
          ${statCardHTML("Prestiges", compactNumber(state.prestigeTotal || 0))}
          ${statCardHTML("Stars", compactNumber(state.prestigeStars || 0))}
          ${statCardHTML("Auto Open", state.autoRoll ? `On · ${formatTime(autoInterval())}` : "Off")}
          ${statCardHTML("Manual Roll Bonus", `+${manualRollBonusPercent().toFixed(2)}% luck · ${compactNumber(currentManualRollStreak())} streak`)}
        </div>
        <div class="stat-bars">
          <div class="item-name">Progress Bars</div>
          ${rows.map(row => statBarHTML(row)).join("")}
        </div>
      `;
    }

    function statCardHTML(label, value) {
      return `<div class="stat-card"><div class="stat-label">${escapeHTML(label)}</div><div class="stat-value" title="${escapeHTML(value)}">${escapeHTML(value)}</div></div>`;
    }

    function statBarHTML(row) {
      const pct = Math.max(0, Math.min(100, (Number(row.value) || 0) / Math.max(1, Number(row.max) || 1) * 100));
      return `<div class="stat-bar-row"><div class="stat-bar-name">${escapeHTML(row.name)}</div><div class="stat-bar-track"><div class="stat-bar-fill" style="width:${pct}%"></div></div><div class="stat-bar-num">${escapeHTML(row.label)}</div></div>`;
    }

    function questProgress(quest) {
      ensureDaily();
      return Math.min(quest.target, Number(state.daily[quest.stat]) || 0);
    }

    function renderQuests() {
      ensureDaily();
      const content = document.getElementById("upgradeContent");
      content.innerHTML = `
        <p class="note">Daily quests reset each day. Rewards were lowered so quests help without skipping the grind.</p>
        <div class="quest-grid">
          ${QUEST_DEFS.map(questCardHTML).join("")}
        </div>
      `;
      content.querySelectorAll("[data-claim-quest]").forEach(button => button.addEventListener("click", () => claimQuest(button.dataset.claimQuest)));
    }

    function questRewardText(quest) {
      const parts = [];
      if (quest.rewardMoney) parts.push(moneyText(quest.rewardMoney));
      for (const [id, qty] of Object.entries(quest.rewardItems || {})) parts.push(`${ITEM_TEMPLATES[id]?.emoji || "🎁"} x${qty}`);
      return parts.join(" + ") || "Reward";
    }

    function questCardHTML(quest) {
      const progress = questProgress(quest);
      const claimed = !!state.daily.claimed[quest.id];
      const ready = progress >= quest.target && !claimed;
      return `
        <div class="quest-card ${claimed ? "claimed" : ""}">
          <div class="item-top"><div><div class="item-emoji">${quest.emoji}</div><div class="item-name">${quest.name}</div></div><div class="item-rarity">${progress}/${quest.target}</div></div>
          <div class="upgrade-meter"><div style="width:${Math.min(100, (progress / quest.target) * 100)}%"></div></div>
          <div class="item-desc">Reward: ${questRewardText(quest)}</div>
          <button class="use-btn" data-claim-quest="${quest.id}" ${ready ? "" : "disabled"}>${claimed ? "Claimed" : ready ? "Claim" : "Not Ready"}</button>
        </div>
      `;
    }

    function claimQuest(id) {
      ensureDaily();
      const quest = QUEST_DEFS.find(q => q.id === id);
      if (!quest || state.daily.claimed[id] || questProgress(quest) < quest.target) return;
      state.daily.claimed[id] = true;
      state.money += quest.rewardMoney || 0;
      for (const [itemId, qty] of Object.entries(quest.rewardItems || {})) {
        state.bag[itemId] = (Number(state.bag[itemId]) || 0) + qty;
      }
      saveState();
      updateStats();
      if (state.settings.sound) playTone(700, 0.06);
      if (currentMenu === "Quests") renderQuestPage("quests");
      else rerenderUpgradePanel("quests");
    }


    function achievementProgress(achievement) {
      return Math.min(achievement.target, statValue(achievement.stat));
    }

    function renderAchievements() {
      if (!state.achievements) state.achievements = { claimed: {} };
      const content = document.getElementById("upgradeContent");
      content.innerHTML = `
        <p class="note">Achievements are harder than daily quests and pay about 3x less. They are mostly for long-term goals and small bonuses.</p>
        <div class="quest-grid">
          ${ACHIEVEMENT_DEFS.map(achievementCardHTML).join("")}
        </div>
      `;
      content.querySelectorAll("[data-claim-achievement]").forEach(button => button.addEventListener("click", () => claimAchievement(button.dataset.claimAchievement)));
    }

    function achievementCardHTML(achievement) {
      if (!state.achievements) state.achievements = { claimed: {} };
      const progress = achievementProgress(achievement);
      const claimed = !!state.achievements.claimed[achievement.id];
      const ready = progress >= achievement.target && !claimed;
      return `
        <div class="quest-card ${claimed ? "claimed" : ""}">
          <div class="item-top"><div><div class="item-emoji">${achievement.emoji}</div><div class="item-name">${achievement.name}</div></div><div class="item-rarity">${progress}/${achievement.target}</div></div>
          <div class="upgrade-meter"><div style="width:${Math.min(100, (progress / achievement.target) * 100)}%"></div></div>
          <div class="item-desc">One-time reward: ${questRewardText(achievement)}</div>
          <button class="use-btn" data-claim-achievement="${achievement.id}" ${ready ? "" : "disabled"}>${claimed ? "Claimed" : ready ? "Claim" : "Not Ready"}</button>
        </div>
      `;
    }

    function claimAchievement(id) {
      if (!state.achievements) state.achievements = { claimed: {} };
      const achievement = ACHIEVEMENT_DEFS.find(a => a.id === id);
      if (!achievement || state.achievements.claimed[id] || achievementProgress(achievement) < achievement.target) return;
      state.achievements.claimed[id] = true;
      state.money += achievement.rewardMoney || 0;
      for (const [itemId, qty] of Object.entries(achievement.rewardItems || {})) {
        state.bag[itemId] = (Number(state.bag[itemId]) || 0) + qty;
      }
      saveState();
      updateStats();
      if (state.settings.sound) playTone(760, 0.06);
      renderQuestPage("achievements");
    }

    function performResetSave() {
      const keepSettings = { ...state.settings };
      state = defaultState();
      state.settings = keepSettings;
      saveState();
      startTitle.style.display = "grid";
      cardStage.classList.remove("show");
      cardStage.innerHTML = "";
      selectedSellId = null;
      pageState = { Collection: 0, Index: 0, Sell: 0 };
      nextAutoAt = 0;
      applySettings();
      ensureShop();
      updateStats();
      renderSettings();
    }

    function renderSettings() {
      clearShopTimer();
      panelTitle.textContent = "Settings";
      const s = state.settings;
      const section = (title, desc, body, extraClass = "") => `
        <section class="settings-section ${extraClass}">
          <div class="settings-section-title">${title}</div>
          <div class="settings-section-desc">${desc}</div>
          <div class="setting-row">${body}</div>
        </section>
      `;
      panelBody.innerHTML = `
        ${section("🎮 Gameplay", "Controls, card visibility, popups, selling safety, and the replayable guide.", `
          ${settingToggle("showOdds", "Show Odds", "Display 1/x odds on cards.")}
          ${settingToggle("newCardBadges", "New Card Badges", "Shows NEW badges and highlights Collection when you pull something new.")}
          ${settingToggle("milestonePopups", "Milestone Popups", "Shows unlock popups when new systems open.")}
          ${settingToggle("offlinePopup", "Offline Summary", "Shows what Auto Roll found while you were away.")}
          ${settingToggle("confirmRareSell", "Confirm Rare Sells", "Ask before selling 1 in 1M+ cards.")}
          ${settingToggle("confirmBulkSell", "Confirm Bulk Sells", "Ask before large bulk sell actions.")}
          <div class="setting-card">
            <button type="button" class="small-action" id="replayTutorial">Replay Tutorial</button>
            <div class="item-desc">Reopens the beginner guide that explains the top bar, Roll button, card area, menus, unlock hints, and stats.</div>
          </div>
        `)}
        ${section("✨ Visuals & Performance", "Tune animations and effects so the game feels smooth on your device.", `
          <div class="setting-card">
            <label for="graphicsSelect">Graphics Quality</label>
            <select id="graphicsSelect">
              <option value="high" ${s.graphics === "high" ? "selected" : ""}>High graphics</option>
              <option value="medium" ${s.graphics === "medium" ? "selected" : ""}>Medium graphics</option>
              <option value="low" ${s.graphics === "low" ? "selected" : ""}>Low graphics</option>
            </select>
            <div class="item-desc">Low graphics disables heavy glows and extra animations for smoother menus.</div>
          </div>
          ${settingToggle("antiLag", "Anti-Lag Mode", "Instant card pages, minimal shadows, and disabled heavy animations.")}
          ${settingToggle("reduceFlash", "Reduce Flashing", "Less intense flickering for comfort and performance.")}
          ${settingToggle("rareReveal", "Rare Reveal Animation", "Keeps 1 in 1M+ pulls inside a flipping reveal box.")}
          ${settingToggle("screenShake", "Rare Pull Shake", "Screen shake only happens for very rare pulls.")}
        `)}
        ${section("🔊 Audio & Device", "Sound, volume, and phone vibration controls.", `
          ${settingToggle("haptics", "Vibration", "Phone vibration when rolls finish, if supported.")}
          ${settingToggle("sound", "Sound FX", "Small generated beeps for rolls, buying, selling, and items.")}
          <div class="setting-card">
            <label for="volumeSlider">Audio Volume</label>
            <input id="volumeSlider" type="range" min="0" max="100" value="${Math.round((Number(s.audioVolume) || 0.45) * 100)}" />
            <div class="item-desc" id="volumeLabel">Volume: ${Math.round((Number(s.audioVolume) || 0.45) * 100)}%</div>
          </div>
        `)}
        ${section("💾 Save / Backup", "Export a backup code or import an existing one.", `
          <div class="setting-card save-card">
            <label>Save Import / Export</label>
            <div class="item-desc">Export your save code as backup, or paste a save code and import it.</div>
            <textarea id="saveCode" class="save-code" placeholder="Save code appears here or paste one here"></textarea>
            <div class="bulk-row"><button class="small-action" id="exportSave">Export Save</button><button class="small-action" id="importSave">Import Save</button></div>
          </div>
        `)}
        ${section("⚠️ Danger Zone", "Reset is separated from normal settings so it is harder to hit by accident.", `
          <div class="setting-card">
            <button type="button" class="small-action danger" id="resetSave">Reset Save</button>
            <div class="item-desc">Resets rolls, money, collection, bag, shop, tags, locks, quests, and upgrades. Settings stay the same.</div>
            <div class="reset-confirm-box" id="resetConfirmBox">
              <div class="item-desc"><strong>Reset needs 2 confirmations.</strong> Click both red buttons below to fully reset.</div>
              <div class="bulk-row">
                <button type="button" class="small-action danger" id="resetConfirmOne">Confirm 1 / 2</button>
                <button type="button" class="small-action danger" id="resetConfirmTwo" disabled>Confirm 2 / 2</button>
                <button type="button" class="small-action" id="resetCancel">Cancel</button>
              </div>
            </div>
          </div>
        `, "danger-zone")}
      `;
      document.getElementById("graphicsSelect").addEventListener("change", event => {
        state.settings.graphics = event.target.value;
        saveState();
        applySettings();
      });
      const volumeSlider = document.getElementById("volumeSlider");
      if (volumeSlider) volumeSlider.addEventListener("input", event => {
        state.settings.audioVolume = Math.max(0, Math.min(1, Number(event.target.value) / 100));
        const label = document.getElementById("volumeLabel");
        if (label) label.textContent = `Volume: ${Math.round(state.settings.audioVolume * 100)}%`;
        saveState();
      });
      panelBody.querySelectorAll("[data-toggle-setting]").forEach(button => {
        button.addEventListener("click", () => {
          const key = button.dataset.toggleSetting;
          state.settings[key] = !state.settings[key];
          saveState();
          applySettings();
          renderSettings();
          updateStats();
        });
      });
      document.getElementById("exportSave").addEventListener("click", exportSave);
      document.getElementById("importSave").addEventListener("click", importSave);
      const replayTutorial = document.getElementById("replayTutorial");
      if (replayTutorial) replayTutorial.addEventListener("click", () => showTutorial(0));
      document.getElementById("resetSave").addEventListener("click", () => {
        const box = document.getElementById("resetConfirmBox");
        const first = document.getElementById("resetConfirmOne");
        const second = document.getElementById("resetConfirmTwo");
        box.classList.add("show");
        first.disabled = false;
        second.disabled = true;
        first.textContent = "Confirm 1 / 2";
      });
      document.getElementById("resetConfirmOne").addEventListener("click", () => {
        document.getElementById("resetConfirmOne").disabled = true;
        document.getElementById("resetConfirmOne").textContent = "Confirmed 1 / 2";
        document.getElementById("resetConfirmTwo").disabled = false;
      });
      document.getElementById("resetConfirmTwo").addEventListener("click", performResetSave);
      document.getElementById("resetCancel").addEventListener("click", () => {
        const box = document.getElementById("resetConfirmBox");
        box.classList.remove("show");
        document.getElementById("resetConfirmOne").disabled = false;
        document.getElementById("resetConfirmTwo").disabled = true;
      });
    }

    function exportSave() {
      const box = document.getElementById("saveCode");
      const code = btoa(unescape(encodeURIComponent(JSON.stringify(state))));
      box.value = code;
      box.select();
    }

    function importSave() {
      const box = document.getElementById("saveCode");
      const code = box.value.trim();
      if (!code) return alert("Paste a save code first.");
      try {
        const parsed = JSON.parse(decodeURIComponent(escape(atob(code))));
        localStorage.setItem(saveKey, JSON.stringify(parsed));
        state = loadState();
        ensureShop();
        applySettings();
        updateStats();
        saveState();
        alert("Save imported successfully.");
        renderSettings();
      } catch (error) {
        alert("That save code could not be imported.");
      }
    }

    function applyOfflineProgress() {
      const now = Date.now();
      const last = Number(state.lastActiveAt) || now;
      const elapsed = Math.max(0, now - last);
      const interval = autoInterval();
      if ((Number(state.prestigeTotal) || 0) <= 0 || !state.autoRoll || interval <= 0 || elapsed < 60000) return;
      const cappedElapsed = Math.min(elapsed, 2 * 60 * 60 * 1000);
      const batches = Math.floor(cappedElapsed / interval);
      const pulls = Math.min(1200, batches * rollCount());
      if (pulls <= 0) return;
      ensureDaily();
      let moneyEarned = 0;
      let best = null;
      for (let i = 0; i < pulls; i++) {
        const card = rollCardResult();
        addPulledCardToState(card, true);
        moneyEarned += Math.max(1, Math.floor(sellPrice(card, 1) * 0.08));
        if (!best || card.odds > best.odds) best = card;
      }
      state.money += moneyEarned;
      state.history = state.history.slice(0, 100);
      state.pendingOffline = { rolls: pulls, money: moneyEarned, bestName: best ? cardTitle(best) : "None", bestOdds: best ? best.odds : 0 };
    }

    function showOfflineNotice() {
      const notice = state.pendingOffline;
      if (!notice || !notice.rolls) return;
      if (state.settings.offlinePopup === false) { state.pendingOffline = null; saveState(); return; }
      alert(`Offline Auto Open finished ${compactNumber(notice.rolls)} roll(s) based on your Auto Open speed, earned ${moneyText(notice.money)}, and best found: ${notice.bestName} (${notice.bestOdds ? "1/" + formatNumber(notice.bestOdds) : "no odds"}).`);
      state.pendingOffline = null;
      saveState();
    }

    function settingToggle(key, title, desc) {
      const active = !!state.settings[key];
      return `
        <div class="setting-card">
          <button class="small-action switch-btn ${active ? "active" : ""}" data-toggle-setting="${key}">${active ? "On" : "Off"} · ${title}</button>
          <div class="item-desc">${desc}</div>
        </div>
      `;
    }

    function playTone(freq, duration) {
      try {
        audioContext = audioContext || new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();
        oscillator.frequency.value = freq;
        const volume = Math.max(0, Math.min(1, Number(state.settings.audioVolume ?? 0.45)));
        gain.gain.value = 0.10 * volume;
        oscillator.connect(gain);
        gain.connect(audioContext.destination);
        oscillator.start();
        gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + duration);
        oscillator.stop(audioContext.currentTime + duration);
      } catch (error) {}
    }

    function escapeHTML(value) {
      return String(value).replace(/[&<>'"]/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;" }[char]));
    }

    if (tutorialTopButton) tutorialTopButton.addEventListener("click", () => showTutorial(0));
    if (prestigeTopButton) prestigeTopButton.addEventListener("click", () => {
      if (!canSeePrestige()) return;
      currentMenu = "Prestige";
      clearShopTimer();
      clearBoostTimer();
      menuBox.classList.add("is-open");
      menuPanel.classList.add("show");
      panelTitle.textContent = "Prestige";
      panelBody.innerHTML = `<div class="toolbar"><button type="button" class="small-action" id="prestigeBackTop">Back</button><div class="timer-pill">Top Bar Prestige</div></div><div id="upgradeContent"></div>`;
      document.getElementById("prestigeBackTop").addEventListener("click", closeMenu);
      renderPrestige();
    });
    if (questTopButton) questTopButton.addEventListener("click", () => renderQuestPage("quests"));
    if (statsTopButton) statsTopButton.addEventListener("click", () => {
      currentMenu = "Stats";
      renderStats();
    });
    if (autoTopButton) autoTopButton.addEventListener("click", () => {
      if ((Number(state.prestigeTotal) || 0) <= 0) return alert("Auto Open unlocks after your first prestige.");
      state.autoRoll = !state.autoRoll;
      nextAutoAt = 0;
      saveState();
      updateStats();
      if (state.settings.sound) playTone(state.autoRoll ? 620 : 260, 0.06);
    });
    document.querySelectorAll(".menu-btn").forEach(button => button.addEventListener("click", () => openMenu(button.dataset.menu)));
    backButton.addEventListener("click", closeMenu);
    rollButton.addEventListener("click", () => roll(true));
    window.addEventListener("keydown", event => {
      const tutorialOpen = document.getElementById("tutorialOverlay")?.classList.contains("show");
      if (tutorialOpen && event.key === "Escape") { event.preventDefault(); finishTutorial(true); return; }
      if (tutorialOpen && event.code === "Space") { event.preventDefault(); return; }
      if (event.code === "Space") { event.preventDefault(); roll(true); }
      if (event.key === "Escape") closeMenu();
    });

    applySettings();
    ensureDaily();
    ensureShop();
    startWeatherLoop();
    startManualRollBonusLoop();
    applyOfflineProgress();
    saveState();
    updateStats();
    refreshMenuUnlocks();
    window.setTimeout(showOfflineNotice, 450);
    if (!state.tutorialSeen) window.setTimeout(() => showTutorial(0), 650);
  </script>
</body>
</html>
